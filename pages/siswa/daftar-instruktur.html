<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Instruktur — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
</head>
<body class="public-layout">

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="../../index.html" class="navbar-logo">EduKita</a>
      <ul class="navbar-menu">
        <li><a href="katalog.html">Katalog</a></li>
        <li><a href="daftar-instruktur.html" class="active">Instruktur</a></li>
        <li><a href="../auth/faq.html">FAQ</a></li>
        <li id="nav-dashboard-item" style="display: none;"><a href="dashboard.html">Dashboard</a></li>
      </ul>
      <div class="navbar-actions" id="navbar-actions"></div>
    </div>
  </nav>

  <main class="section catalog-main">
    <div class="container">
      <div class="page-header-flex">
        <h1>Daftar Instruktur</h1>
        <p class="page-meta"><span id="total-instruktur">0</span> instruktur terdaftar</p>
      </div>

      <div id="grid-instruktur" class="grid-3"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p class="footer-brand">EduKita</p>
      <div class="footer-links">
        <a href="../auth/syarat-ketentuan.html">Syarat & Ketentuan</a>
        <a href="../auth/faq.html">FAQ</a>
      </div>
      <p class="footer-copy">&copy; 2025 EduKita — Platform E-Learning. All rights reserved.</p>
    </div>
  </footer>

  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script>
    initStorage();

    function renderNavbar() {
      var container = document.getElementById('navbar-actions');
      var user = getCurrentUser();

      if (user && user.role === 'siswa') {
        document.getElementById('nav-dashboard-item').style.display = 'list-item';
        container.innerHTML =
          '<span class="navbar-user">' + user.nama + '</span>' +
          '<a href="cart.html" class="btn btn-secondary btn-sm">Keranjang</a>' +
          '<button type="button" class="btn btn-danger btn-sm" id="btn-logout">Logout</button>';
        document.getElementById('btn-logout').addEventListener('click', logout);
      } else if (user) {
        container.innerHTML =
          '<span class="navbar-user">' + user.nama + '</span>' +
          '<button type="button" class="btn btn-danger btn-sm" id="btn-logout">Logout</button>';
        document.getElementById('btn-logout').addEventListener('click', logout);
      } else {
        container.innerHTML =
          '<a href="../auth/login.html" class="btn btn-secondary btn-sm">Masuk</a>' +
          '<a href="../auth/register-siswa.html" class="btn btn-primary btn-sm">Daftar</a>';
      }
    }

    function hitungKelas(instrukturId) {
      return getAll('kelas').filter(function (k) {
        return k.instrukturId === instrukturId && k.status === 'published';
      }).length;
    }

    function renderInstruktur() {
      var container = document.getElementById('grid-instruktur');
      var instrukturList = getAll('users').filter(function (u) {
        return u.role === 'instruktur';
      });

      document.getElementById('total-instruktur').textContent = instrukturList.length;

      if (instrukturList.length === 0) {
        container.innerHTML =
          '<div class="empty-state grid-empty-msg">' +
            '<p>Belum ada instruktur terdaftar.</p>' +
          '</div>';
        return;
      }

      container.innerHTML = instrukturList.map(function (ins) {
        var foto = ins.foto ? '../../' + ins.foto : '../../assets/images/placeholder.jpg';
        var keahlian = ins.keahlian || 'Belum diisi';
        var jumlahKelas = hitungKelas(ins.id);
        var profilHref = '../instruktur/profil-publik.html?id=' + encodeURIComponent(ins.id);

        return (
          '<a href="' + profilHref + '" class="card instruktur-card">' +
            '<img class="instruktur-avatar" src="' + foto + '" alt="' + ins.nama + '" onerror="this.src=\'../../assets/images/placeholder.jpg\'">' +
            '<h3>' + ins.nama + '</h3>' +
            '<p class="text-gray instruktur-keahlian">' + keahlian + '</p>' +
            '<p class="instruktur-meta"><span class="badge badge-primary">' + jumlahKelas + ' kelas</span></p>' +
          '</a>'
        );
      }).join('');
    }

    renderNavbar();
    renderInstruktur();
  </script>
</body>
</html>
