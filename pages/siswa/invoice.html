<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../boot-siswa.js"></script>
</head>
<body class="invoice-page">

  <div class="layout-sidebar">
    <aside class="sidebar no-print">
      <a href="dashboard.html" class="sidebar-brand">EduKita</a>
      <nav>
        <a href="dashboard.html" class="sidebar-link" data-page="dashboard">📊 Dashboard</a>
        <a href="katalog.html" class="sidebar-link" data-page="katalog">📚 Katalog Kelas</a>
        <a href="cart.html" class="sidebar-link" data-page="cart">🛒 Kelas Saya</a>
        <a href="wishlist.html" class="sidebar-link" data-page="wishlist">❤️ Wishlist</a>
        <a href="riwayat-transaksi.html" class="sidebar-link" data-page="riwayat-transaksi">🧾 Riwayat Transaksi</a>
        <a href="sertifikat.html" class="sidebar-link" data-page="sertifikat">🏆 Sertifikat</a>
        <a href="profil.html" class="sidebar-link" data-page="profil">👤 Profil</a>
        <a href="notifikasi.html" class="sidebar-link" data-page="notifikasi">🔔 Notifikasi</a>
        <a href="#" class="sidebar-link logout" id="btn-logout">🚪 Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <div id="invoice-area"></div>
    </main>
  </div>

  <script>
    (function () {
      var user = window.__pageUser;
      if (!user) return;
    setActiveSidebar('riwayat-transaksi');

    document.getElementById('btn-logout').addEventListener('click', function (e) {
      e.preventDefault();
      logout();
    });

    function formatRupiah(angka) {
      return angka === 0 ? 'GRATIS' : 'Rp ' + angka.toLocaleString('id-ID');
    }

    function formatTanggal(iso) {
      if (!iso) return '-';
      return new Date(iso).toLocaleString('id-ID', {
        day: 'numeric',
        month: 'long',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getQueryId() {
      var params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    function renderInvoice() {
      var area = document.getElementById('invoice-area');
      var transaksiId = getQueryId();

      if (!transaksiId) {
        area.innerHTML =
          '<div class="empty-state no-print">' +
            '<p>Invoice tidak ditemukan.</p>' +
            '<a href="riwayat-transaksi.html" class="btn btn-secondary">Lihat Riwayat Transaksi</a>' +
          '</div>';
        return;
      }

      var transaksi = getById('transaksi', transaksiId);
      if (!transaksi || !sameUserId(transaksi.userId, user.id)) {
        area.innerHTML =
          '<div class="empty-state no-print">' +
            '<p>Transaksi tidak ditemukan atau bukan milik akun Anda.</p>' +
            '<a href="dashboard.html" class="btn btn-secondary">Kembali ke Dashboard</a>' +
          '</div>';
        return;
      }

      var kelasItems = (transaksi.items || []).map(function (kelasId) {
        var kelas = getById('kelas', kelasId);
        return kelas ? { id: kelas.id, judul: kelas.judul, harga: kelas.harga } : null;
      }).filter(Boolean);

      var rows = kelasItems.map(function (item) {
        return (
          '<tr>' +
            '<td>' + item.judul + '</td>' +
            '<td class="text-right">' + formatRupiah(item.harga) + '</td>' +
          '</tr>'
        );
      }).join('');

      var firstKelasId = kelasItems.length > 0 ? kelasItems[0].id : null;
      var belajarHref = firstKelasId
        ? 'ruang-belajar.html?id=' + encodeURIComponent(firstKelasId)
        : 'katalog.html';

      area.innerHTML =
        '<div class="invoice-card card" id="invoice-print">' +
          '<div class="invoice-header">' +
            '<div>' +
              '<h1 class="invoice-title">Invoice Pembayaran</h1>' +
              '<p class="invoice-brand">Platform E-Learning EduKita</p>' +
            '</div>' +
            '<span class="badge badge-success invoice-status">LUNAS</span>' +
          '</div>' +
          '<div class="invoice-meta grid-2">' +
            '<div><strong>No. Transaksi</strong><br>' + transaksi.id + '</div>' +
            '<div><strong>Tanggal</strong><br>' + formatTanggal(transaksi.tanggal) + '</div>' +
            '<div><strong>Metode Pembayaran</strong><br>' + (transaksi.metode || '-') + '</div>' +
            '<div><strong>Pembeli</strong><br>' + user.nama + '</div>' +
          '</div>' +
          '<div class="table-wrap invoice-table-wrap">' +
            '<table class="table invoice-table">' +
              '<thead><tr><th>Kelas Dibeli</th><th class="text-right">Harga</th></tr></thead>' +
              '<tbody>' + (rows || '<tr><td colspan="2">Tidak ada item</td></tr>') + '</tbody>' +
              '<tfoot>' +
                '<tr class="invoice-total-row">' +
                  '<td><strong>Total</strong></td>' +
                  '<td class="text-right"><strong>' + formatRupiah(transaksi.total) + '</strong></td>' +
                '</tr>' +
              '</tfoot>' +
            '</table>' +
          '</div>' +
          '<p class="invoice-thanks">Terima kasih telah belajar bersama EduKita!</p>' +
        '</div>' +
        '<div class="invoice-actions no-print">' +
          '<a href="' + belajarHref + '" class="btn btn-primary">Mulai Belajar</a>' +
          '<button type="button" class="btn btn-secondary" id="btn-cetak">Cetak Invoice</button>' +
          '<a href="riwayat-transaksi.html" class="btn btn-secondary">Riwayat Transaksi</a>' +
        '</div>';

      document.getElementById('btn-cetak').addEventListener('click', function () {
        window.print();
      });
    }

    renderInvoice();
  })();</script>
</body>
</html>
