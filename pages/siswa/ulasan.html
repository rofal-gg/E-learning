<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beri Ulasan — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../../css/anggota3.css">
  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../boot-siswa.js"></script>
</head>
<body>

  <div class="layout-sidebar">
    <aside class="sidebar">
      <a href="dashboard.html" class="sidebar-brand">EduKita</a>
      <nav>
        <a href="dashboard.html" class="sidebar-link" data-page="dashboard"><img src="../../assets/icons/Dashboard.png" width="20">Dashboard</a>
        <a href="katalog.html" class="sidebar-link" data-page="katalog"><img src="../../assets/icons/katalog_kelas.png" width="20">Katalog Kelas</a>
        <a href="cart.html" class="sidebar-link" data-page="cart"><img src="../../assets/icons/kelas.png" width="20">Kelas Saya</a>
        <a href="wishlist.html" class="sidebar-link" data-page="wishlist"><img src="../../assets/icons/wishlist.png" width="20">Wishlist</a>
        <a href="riwayat-transaksi.html" class="sidebar-link" data-page="riwayat-transaksi"><img src="../../assets/icons/riwayat_transaksi.png" width="20">Riwayat Transaksi</a>
        <a href="sertifikat.html" class="sidebar-link" data-page="sertifikat"><img src="../../assets/icons/sertifikat.png" width="20">Sertifikat</a>
        <a href="profil.html" class="sidebar-link" data-page="profil"><img src="../../assets/icons/profil.png" width="20">Profil</a>
        <a href="notifikasi.html" class="sidebar-link" data-page="notifikasi"><img src="../../assets/icons/notifikasi.png" width="20">Notifikasi</a>
        <a href="#" class="sidebar-link logout" id="btn-logout"><img src="../../assets/icons/logout.png" width="20">Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Beri Ulasan</h1>
      </div>

      <div id="alert-box" class="alert-box-wrap"></div>
      <div id="ulasan-area"></div>
    </main>
  </div>

  <script>
    var user = window.__pageUser;
    var selectedRating = 0;
    var existingUlasan = null;

    if (user) {
      setActiveSidebar();

      document.getElementById('btn-logout').addEventListener('click', function (e) {
        e.preventDefault();
        logout();
      });

      renderHalamanUlasan();
    }

    // render halaman sesuai query kelas
    function renderHalamanUlasan() {
      var area = document.getElementById('ulasan-area');
      var kelasId = getQueryParam('kelasId') || getQueryParam('id');

      if (!kelasId) {
        area.innerHTML = `
          <div class="empty-state">
            <p>Parameter kelas tidak ditemukan.</p>
            <a href="katalog.html" class="btn btn-primary">Kembali ke Katalog</a>
          </div>
        `;
        return;
      }

      var kelas = getById('kelas', kelasId);
      if (!kelas) {
        area.innerHTML = `
          <div class="empty-state">
            <p>Kelas tidak ditemukan.</p>
            <a href="katalog.html" class="btn btn-primary">Kembali ke Katalog</a>
          </div>
        `;
        return;
      }

      if (!userOwnsKelas(user.id, kelasId)) {
        area.innerHTML = `
          <div class="empty-state">
            <p>Kamu harus membeli kelas ini terlebih dahulu untuk memberi ulasan.</p>
            <a href="detail-kelas.html?id=${encodeURIComponent(kelasId)}" class="btn btn-primary">Lihat Detail Kelas</a>
          </div>
        `;
        return;
      }

      var ulasanLama = getAll('ulasan').find(function (u) {
        return String(u.kelasId) === String(kelasId) && sameUserId(u.userId, user.id);
      });

      renderFormUlasan(kelas, ulasanLama);
    }

    // picker bintang rating
    function renderStarsPicker(rating) {
      var html = '';
      for (var i = 1; i <= 5; i++) {
        html += `<button type="button" class="star-btn${i <= rating ? ' active' : ''}" data-star="${i}" aria-label="${i} bintang">★</button>`;
      }
      return `<div class="star-picker" id="star-picker">${html}</div>`;
    }

    // pasang event klik bintang
    function bindStarPicker() {
      document.querySelectorAll('#star-picker .star-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          selectedRating = parseInt(this.getAttribute('data-star'), 10);
          document.querySelectorAll('#star-picker .star-btn').forEach(function (b, idx) {
            b.classList.toggle('active', idx < selectedRating);
          });
        });
      });
    }

    // render form ulasan (baru atau edit)
    function renderFormUlasan(kelas, ulasanLama) {
      existingUlasan = ulasanLama || null;
      selectedRating = ulasanLama ? ulasanLama.rating : 0;

      var starsDisplay = ulasanLama
        ? '★'.repeat(ulasanLama.rating) + '☆'.repeat(5 - ulasanLama.rating)
        : '';

      var oldReviewBlock = ulasanLama
        ? `
          <div class="card ulasan-lama">
            <h3>Ulasan Kamu Saat Ini</h3>
            <p class="stars">${starsDisplay}</p>
            <p>${ulasanLama.komentar}</p>
            <p class="text-gray">Dikirim: ${ulasanLama.tanggal || '-'}</p>
            <p class="text-gray">Kamu bisa mengedit ulasan di bawah.</p>
          </div>
        `
        : '';

      document.getElementById('ulasan-area').innerHTML = `
        ${oldReviewBlock}
        <div class="card ulasan-form-card">
          <h2>${kelas.judul}</h2>
          <p class="text-gray">Bagikan pengalaman belajarmu</p>
          <form id="form-ulasan">
            <div class="form-group">
              <label class="form-label">Rating</label>
              ${renderStarsPicker(selectedRating)}
            </div>
            <div class="form-group">
              <label class="form-label" for="komentar">Komentar</label>
              <textarea id="komentar" class="form-input" rows="4" required placeholder="Tulis ulasan kamu...">${ulasanLama ? ulasanLama.komentar : ''}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">${ulasanLama ? 'Perbarui Ulasan' : 'Kirim Ulasan'}</button>
            <a href="detail-kelas.html?id=${encodeURIComponent(kelas.id)}" class="btn btn-secondary">Kembali ke Kelas</a>
          </form>
        </div>
      `;

      bindStarPicker();

      document.getElementById('form-ulasan').addEventListener('submit', function (e) {
        e.preventDefault();
        simpanUlasan(kelas);
      });
    }

    // simpan atau perbarui ulasan
    function simpanUlasan(kelas) {
      var komentar = document.getElementById('komentar').value.trim();
      if (selectedRating < 1) {
        showAlert('alert-box', 'Pilih rating bintang terlebih dahulu.', 'danger');
        return;
      }
      if (!komentar) {
        showAlert('alert-box', 'Komentar tidak boleh kosong.', 'danger');
        return;
      }

      if (existingUlasan) {
        updateItem('ulasan', existingUlasan.id, {
          rating: selectedRating,
          komentar: komentar,
          tanggal: new Date().toISOString().slice(0, 10)
        });
        showAlert('alert-box', 'Ulasan berhasil diperbarui!', 'success');
      } else {
        createItem('ulasan', {
          id: generateId('ul'),
          kelasId: kelas.id,
          userId: user.id,
          userName: user.nama,
          rating: selectedRating,
          komentar: komentar,
          tanggal: new Date().toISOString().slice(0, 10)
        });
        showAlert('alert-box', 'Ulasan berhasil dikirim!', 'success');
      }

      var updated = getAll('ulasan').find(function (u) {
        return String(u.kelasId) === String(kelas.id) && sameUserId(u.userId, user.id);
      });
      renderFormUlasan(kelas, updated);
    }
  </script>
</body>
</html>
