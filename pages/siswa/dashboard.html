<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Siswa — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../../css/anggota1.css">
  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../boot-siswa.js"></script>
  <script src="../../components/components.js"></script>
</head>
<body>

  <div class="layout-sidebar">
    <!-- Sidebar (dirender via komponen) -->
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
      <div class="page-header">
        <h1 id="greeting">Halo, Siswa!</h1>
      </div>

      <div class="grid-5" id="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-value" id="kpi-kelas-dibeli">0</div>
          <div class="kpi-label">Total Kelas Dibeli</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="kpi-kelas-selesai">0</div>
          <div class="kpi-label">Kelas Selesai</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="kpi-diskusi">0</div>
          <div class="kpi-label">Total Diskusi</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="kpi-poin">0</div>
          <div class="kpi-label">Poin</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="kpi-tingkatan">-</div>
          <div class="kpi-label">Tingkatan</div>
        </div>
      </div>

      <section class="content-section">
        <h2>Lanjutkan Belajar</h2>
        <div id="lanjut-belajar"></div>
      </section>

      <section class="content-section">
        <h2>Kelas Selesai</h2>
        <div id="kelas-selesai"></div>
      </section>

      <section class="content-section">
        <h2>Jadwal Sesi Tatap Muka</h2>
        <div id="jadwal-tatap-muka"></div>
      </section>

      <section class="content-section">
        <h2>Kelas Terbaru di Katalog</h2>
        <div id="kelas-terbaru" class="grid-3"></div>
      </section>
    </main>
  </div>

  <script>
    var user = window.__pageUser;

    // render sidebar siswa
    renderSidebarSiswa('dashboard');
    document.getElementById('greeting').textContent = 'Halo, ' + user.nama + '!';

    // ambil semua id kelas yang sudah dibeli user ini
    function ambilKelasIds() {
      var transaksi = getAll('transaksi').filter(function (t) {
        return sameUserId(t.userId, user.id);
      });
      var ids = [];
      transaksi.forEach(function (t) {
        (t.items || []).forEach(function (id) {
          if (ids.indexOf(id) === -1) ids.push(id);
        });
      });
      return ids;
    }

    // ambil progres user untuk satu kelas
    function ambilProgres(kelasId) {
      var p = getAll('progres').find(function (pr) {
        return sameUserId(pr.userId, user.id) && String(pr.kelasId) === String(kelasId);
      });
      return p || { persen: 0, babSelesai: [] };
    }

    // isi angka KPI cards
    function tampilkanKPI() {
      var ids = ambilKelasIds();
      var selesai = getAll('progres').filter(function (p) {
        return sameUserId(p.userId, user.id) && p.persen >= 100;
      });
      var diskusi = getAll('diskusi').filter(function (d) {
        return sameUserId(d.userId, user.id);
      });
      document.getElementById('kpi-kelas-dibeli').textContent = ids.length;
      document.getElementById('kpi-kelas-selesai').textContent = selesai.length;
      document.getElementById('kpi-diskusi').textContent = diskusi.length;
      var freshUser = getById('users', user.id);
      document.getElementById('kpi-poin').textContent = (freshUser && freshUser.poin) || 0;
      var t = freshUser && freshUser.tingkatan;
      document.getElementById('kpi-tingkatan').textContent = t && t !== 'belum_tes'
        ? t.charAt(0).toUpperCase() + t.slice(1)
        : 'Belum Tes';
    }

    // cari transaksi terakhir untuk sebuah kelas
    function ambilTransaksiKelas(kelasId) {
      var uid = String(user.id);
      var kid = String(kelasId);
      var semua = getAll('transaksi').filter(function (t) {
        return sameUserId(t.userId, uid) && (t.items || []).some(function (id) { return String(id) === kid; });
      });
      if (semua.length === 0) return null;
      return semua.sort(function (a, b) { return new Date(b.tanggal) - new Date(a.tanggal); })[0];
    }

    // buat HTML satu card kelas lanjut belajar
    function buatCardLanjut(kelas, persen) {
      var transaksi = ambilTransaksiKelas(kelas.id);
      var infoPaket = '';
      var kelasExtra = '';

      if (transaksi && transaksi.tanggalBerakhir) {
        var sisa = Math.ceil((new Date(transaksi.tanggalBerakhir) - new Date()) / (1000 * 60 * 60 * 24));
        if (sisa > 0) {
          infoPaket = 'Berakhir: ' + formatTanggal(transaksi.tanggalBerakhir) + ' (' + sisa + ' hari lagi)';
          if (sisa <= 7) kelasExtra = 'paket-mau-habis';
        } else {
          infoPaket = 'Paket telah berakhir';
          kelasExtra = 'paket-habis';
        }
      } else if (transaksi) {
        infoPaket = 'Akses Seumur Hidup';
      }

      return `
        <div class="card-lanjut">
          <h3>${kelas.judul}</h3>
          <p class="text-gray">${kelas.instrukturNama}</p>
          <p class="progress-text">Progres: ${persen}%</p>
          <div class="progress-bar"><div class="progress-fill" style="width:${persen}%"></div></div>
          <p class="paket-info ${kelasExtra}">${infoPaket}</p>
          <a href="ruang-belajar.html?id=${kelas.id}" class="btn btn-primary btn-sm">Lanjutkan Belajar</a>
        </div>
      `;
    }

    // tampilkan section lanjutkan belajar
    function tampilkanLanjutBelajar() {
      var container = document.getElementById('lanjut-belajar');
      var ids = ambilKelasIds();

      if (ids.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>Kamu belum mengikuti kelas. Yuk mulai belajar!</p>
            <a href="katalog.html" class="btn btn-primary">Jelajahi Katalog</a>
          </div>
        `;
        return;
      }

      var belumSelesai = ids.map(function (id) {
        return {
          kelas: getById('kelas', id),
          persen: Math.round(ambilProgres(id).persen || 0)
        };
      }).filter(function (item) {
        return item.kelas && item.persen < 100;
      }).slice(0, 3);

      if (belumSelesai.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>Semua kelas yang kamu beli sudah selesai. Kerja bagus!</p>
            <a href="katalog.html" class="btn btn-secondary">Lihat Katalog Lainnya</a>
          </div>
        `;
        return;
      }

      container.innerHTML = '<div class="grid-3">' +
        belumSelesai.map(function (item) {
          return buatCardLanjut(item.kelas, item.persen);
        }).join('') +
      '</div>';
    }

    // tampilkan jadwal tatap muka untuk kelas yang dimiliki
    function tampilkanJadwalTatapMuka() {
      var container = document.getElementById('jadwal-tatap-muka');
      var sekarang = new Date();
      var kelasIds = ambilKelasIds();
      var semuaJadwal = getAll('jadwal_tatap_muka');
      var jadwalRelevant = semuaJadwal.filter(function (j) {
        var tglJadwal = new Date(j.tanggal + 'T' + (j.waktu || '00:00'));
        var selisihHari = (tglJadwal - sekarang) / (1000 * 60 * 60 * 24);
        var kelasMatch = kelasIds.indexOf(String(j.kelasId)) !== -1;
        return kelasMatch && selisihHari > -1;
      }).sort(function (a, b) {
        return new Date(a.tanggal + 'T' + (a.waktu || '00:00')) - new Date(b.tanggal + 'T' + (b.waktu || '00:00'));
      }).slice(0, 5);

      if (jadwalRelevant.length === 0) {
        container.innerHTML = '<p class="text-gray">Belum ada jadwal sesi tatap muka.</p>';
        return;
      }

      container.innerHTML = jadwalRelevant.map(function (j) {
        var tglFormatted = formatTanggal(j.tanggal);
        var kelas = getById('kelas', j.kelasId);
        var namaKelas = kelas ? kelas.judul : 'Kelas';
        return `
          <div class="jadwal-box">
            <div class="jadwal-tanggal">
              <span class="jadwal-tgl">${tglFormatted}</span>
              <span class="jadwal-waktu">${j.waktu || '–'}</span>
            </div>
            <div class="jadwal-info">
              <p class="jadwal-judul">${j.judul}</p>
              <p class="jadwal-kelas-nama">${namaKelas}</p>
            </div>
            <a href="${j.linkGmeet}" target="_blank" rel="noopener" class="btn btn-primary btn-sm jadwal-btn">Ikuti Sesi</a>
          </div>
        `;
      }).join('');
    }

    // tampilkan kelas selesai dengan tombol ulasan
    function tampilkanKelasSelesai() {
      var container = document.getElementById('kelas-selesai');
      var ids = ambilKelasIds();

      var selesai = ids.map(function (id) {
        return { kelas: getById('kelas', id), progres: ambilProgres(id) };
      }).filter(function (item) {
        return item.kelas && item.progres.persen >= 100;
      });

      if (selesai.length === 0) {
        container.innerHTML = '<p class="text-gray">Belum ada kelas yang selesai. Tetap semangat belajar!</p>';
        return;
      }

      var semuaUlasan = getAll('ulasan');

      container.innerHTML = '<div class="grid-3">' +
        selesai.map(function (item) {
          var sudahUlas = semuaUlasan.some(function (u) {
            return String(u.kelasId) === String(item.kelas.id) && sameUserId(u.userId, user.id);
          });
          var btnUlas = sudahUlas
            ? '<span class="badge badge-primary">Ulasan sudah diberikan</span>'
            : '<a href="ulasan.html?kelasId=' + item.kelas.id + '" class="btn btn-primary btn-sm">Beri Ulasan</a>';
          return '' +
            '<div class="card-lanjut">' +
              '<h3>' + item.kelas.judul + '</h3>' +
              '<p class="text-gray">' + item.kelas.instrukturNama + '</p>' +
              '<p class="progress-text">Progres: 100%</p>' +
              '<div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>' +
              '<p class="paket-info">Selesai</p>' +
              '<div style="margin-top:12px">' + btnUlas + '</div>' +
            '</div>';
        }).join('') +
      '</div>';
    }

    // tampilkan 3 kelas terbaru dari katalog
    function tampilkanKelasTerbaru() {
      var container = document.getElementById('kelas-terbaru');
      var list = getAll('kelas')
        .filter(function (k) { return k.status === 'published'; })
        .slice(-3)
        .reverse();

      if (list.length === 0) {
        container.innerHTML = '<p class="text-gray text-center">Belum ada kelas di katalog.</p>';
        return;
      }

      container.innerHTML = list.map(function (k) {
        return buatCardKelas(k, { basePath: '../../' });
      }).join('');
    }

    tampilkanKPI();
    tampilkanLanjutBelajar();
    tampilkanKelasSelesai();
    tampilkanJadwalTatapMuka();
    tampilkanKelasTerbaru();
  </script>
</body>
</html>
