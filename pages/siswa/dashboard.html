<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Siswa — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../boot-siswa.js"></script>
</head>
<body>

  <div class="layout-sidebar">
    <aside class="sidebar">
      <a href="dashboard.html" class="sidebar-brand">EduKita</a>
      <nav>
        <a href="dashboard.html" class="sidebar-link" data-page="dashboard"><img src="../../assets/icons/Dashboard.png" width="20"> Dashboard</a>
        <a href="katalog.html" class="sidebar-link" data-page="katalog">📚 Katalog Kelas</a>
        <a href="cart.html" class="sidebar-link" data-page="cart">🛒 Kelas Saya</a>
        <a href="wishlist.html" class="sidebar-link" data-page="wishlist">❤️ Wishlist</a>
        <a href="riwayat-transaksi.html" class="sidebar-link" data-page="riwayat-transaksi">🧾 Riwayat Transaksi</a>
        <a href="sertifikat.html" class="sidebar-link" data-page="sertifikat">🏆 Sertifikat</a>
        <a href="profil.html" class="sidebar-link" data-page="profil">👤 Profil</a>
        <a href="notifikasi.html" class="sidebar-link" data-page="notifikasi">🔔 Notifikasi</a>
        <a href="#" class="sidebar-link logout" id="btn-logout">🚪 Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 id="greeting">Halo, Siswa! 👋</h1>
      </div>

      <div class="grid-4" id="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-value" id="kpi-kelas-dibeli">0</div>
          <div class="kpi-label">Total Kelas Dibeli</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="kpi-kelas-selesai">0</div>
          <div class="kpi-label">Kelas Selesai</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="kpi-diskusi">0</div>
          <div class="kpi-label">Total Diskusi</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value">120</div>
          <div class="kpi-label">Poin</div>
        </div>
      </div>

      <section class="content-section">
        <h2>Lanjutkan Belajar</h2>
        <div id="lanjut-belajar"></div>
      </section>

      <section class="content-section">
        <h2>Kelas Terbaru di Katalog</h2>
        <div id="kelas-terbaru" class="grid-3"></div>
      </section>
    </main>
  </div>

  <script>
    (function () {
      var user = window.__pageUser;
      if (!user) return;
    document.getElementById('greeting').textContent = 'Halo, ' + user.nama + '! 👋';

    document.querySelectorAll('.sidebar-link[data-page]').forEach(function (link) {
      if (window.location.href.includes(link.getAttribute('data-page'))) {
        link.classList.add('active');
      }
    });

    document.getElementById('btn-logout').addEventListener('click', function (e) {
      e.preventDefault();
      logout();
    });

    function formatRupiah(angka) {
      return angka === 0 ? 'GRATIS' : 'Rp ' + angka.toLocaleString('id-ID');
    }

    function getUserTransaksi() {
      return getAll('transaksi').filter(function (t) { return sameUserId(t.userId, user.id); });
    }

    function getKelasIdsDibeli() {
      var ids = [];
      getUserTransaksi().forEach(function (t) {
        (t.items || []).forEach(function (kelasId) {
          if (ids.indexOf(kelasId) === -1) ids.push(kelasId);
        });
      });
      return ids;
    }

    function getProgres(kelasId) {
      var p = getAll('progres').find(function (pr) {
        return sameUserId(pr.userId, user.id) && String(pr.kelasId) === String(kelasId);
      });
      return p || { persen: 0, babSelesai: [] };
    }

    function renderKPI() {
      var kelasIds = getKelasIdsDibeli();
      var progresList = getAll('progres').filter(function (p) {
        return sameUserId(p.userId, user.id) && p.persen >= 100;
      });
      var diskusiCount = getAll('diskusi').filter(function (d) {
        return sameUserId(d.userId, user.id);
      }).length;

      document.getElementById('kpi-kelas-dibeli').textContent = kelasIds.length;
      document.getElementById('kpi-kelas-selesai').textContent = progresList.length;
      document.getElementById('kpi-diskusi').textContent = diskusiCount;
    }

    function renderLanjutBelajar() {
      var container = document.getElementById('lanjut-belajar');
      var kelasIds = getKelasIdsDibeli();

      if (kelasIds.length === 0) {
        container.innerHTML =
          '<div class="empty-state">' +
            '<p>Kamu belum mengikuti kelas. Yuk mulai belajar!</p>' +
            '<a href="katalog.html" class="btn btn-primary">Jelajahi Katalog</a>' +
          '</div>';
        return;
      }

      var belumSelesai = kelasIds
        .map(function (id) {
          var kelas = getById('kelas', id);
          var progres = getProgres(id);
          return { kelas: kelas, progres: progres };
        })
        .filter(function (item) {
          return item.kelas && item.progres.persen < 100;
        })
        .slice(0, 3);

      if (belumSelesai.length === 0) {
        container.innerHTML =
          '<div class="empty-state">' +
            '<p>Semua kelas yang kamu beli sudah selesai. Kerja bagus! 🎉</p>' +
            '<a href="katalog.html" class="btn btn-secondary">Lihat Katalog Lainnya</a>' +
          '</div>';
        return;
      }

      container.innerHTML = '<div class="grid-3">' + belumSelesai.map(function (item) {
        var k = item.kelas;
        var persen = Math.round(item.progres.persen || 0);
        return (
          '<div class="card-lanjut">' +
            '<h3>' + k.judul + '</h3>' +
            '<p class="text-gray">' + k.instrukturNama + '</p>' +
            '<p class="progress-text">Progres: ' + persen + '%</p>' +
            '<div class="progress-bar"><div class="progress-fill" style="width:' + persen + '%"></div></div>' +
            '<a href="ruang-belajar.html?id=' + k.id + '" class="btn btn-primary btn-sm">Lanjutkan Belajar</a>' +
          '</div>'
        );
      }).join('') + '</div>';
    }

    function renderKelasTerbaru() {
      var container = document.getElementById('kelas-terbaru');
      var kelasList = getAll('kelas')
        .filter(function (k) { return k.status === 'published'; })
        .slice(-3)
        .reverse();

      if (kelasList.length === 0) {
        container.innerHTML = '<p class="text-gray text-center">Belum ada kelas di katalog.</p>';
        return;
      }

      container.innerHTML = kelasList.map(function (k) {
        return (
          '<div class="card-kelas">' +
            '<img src="../../' + k.gambar + '" alt="' + k.judul + '" onerror="this.src=\'../../assets/images/placeholder.jpg\'">' +
            '<div class="card-body">' +
              '<span class="badge badge-primary">' + k.kategoriNama + '</span>' +
              '<h3>' + k.judul + '</h3>' +
              '<p class="text-gray">' + k.instrukturNama + '</p>' +
              '<div class="card-kelas-footer">' +
                '<strong>' + formatRupiah(k.harga) + '</strong>' +
                '<a href="detail-kelas.html?id=' + k.id + '" class="btn btn-primary btn-sm">Lihat Kelas</a>' +
              '</div>' +
            '</div>' +
          '</div>'
        );
      }).join('');
    }

    renderKPI();
    renderLanjutBelajar();
    renderKelasTerbaru();
  })();</script>
</body>
</html>
