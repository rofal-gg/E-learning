<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hasil Kuis Penempatan — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../../css/anggota2.css">
  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../boot-siswa.js"></script>
</head>
<body>

  <main class="kuis-page">
    <div class="kuis-container">
      <div class="kuis-header">
        <h1>Hasil Kuis Penempatan</h1>
      </div>
      <div id="hasil-content"></div>
    </div>
  </main>

  <script>
    var user = window.__pageUser;
    var tingkatan = getQueryParam('tingkatan');
    var skor = parseInt(getQueryParam('skor'), 10);

    var deskripsi = {
      pemula: 'Mulai dari dasar — kamu akan belajar HTML, CSS, dan JavaScript fundamental.',
      menengah: 'Bagus! Kamu siap mengambil kelas tingkat menengah.',
      mahir: 'Luar biasa! Kamu bisa mengambil kursus tingkat lanjut.'
    };

    var badgeClass = {
      pemula: 'badge-warning',
      menengah: 'badge-primary',
      mahir: 'badge-success'
    };

    var container = document.getElementById('hasil-content');

    if (!tingkatan || isNaN(skor)) {
      container.innerHTML = '<div class="empty-state card"><p>Data hasil tidak ditemukan. Kerjakan kuis penempatan terlebih dahulu.</p><a href="kuis-penempatan.html" class="btn btn-primary">Ikuti Kuis</a></div>';
    } else {
      var badge = badgeClass[tingkatan] || 'badge-primary';
      var teks = deskripsi[tingkatan] || '';

      container.innerHTML = `
        <div class="card hasil-skor-box">
          <p class="hasil-skor-angka">${skor} / 9</p>
          <p class="hasil-skor-label">Kamu menjawab ${skor} dari 9 soal dengan benar</p>
          <div class="hasil-badge-wrap">
            <span class="badge ${badge}" style="font-size:1rem;padding:6px 18px">${tingkatan.charAt(0).toUpperCase() + tingkatan.slice(1)}</span>
          </div>
        </div>
        <div class="card" style="text-align:center;padding:24px;margin-bottom:20px">
          <p style="color:var(--gray-700);margin:0 0 20px">${teks}</p>
          <a href="katalog.html" class="btn btn-primary">Mulai Belajar</a>
        </div>
      `;
    }
  </script>
</body>
</html>
