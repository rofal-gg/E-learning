<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuis — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../boot-siswa.js"></script>
</head>
<body>

  <main class="kuis-page">
    <div class="kuis-container">
      <div class="kuis-header">
        <h1 id="kuis-judul">Kuis</h1>
        <p class="kuis-meta" id="kuis-meta"></p>
      </div>
      <div id="kuis-content" class="card kuis-card"></div>
      <div class="kuis-nav">
        <a href="#" id="link-kembali" class="btn btn-secondary">Kembali ke Ruang Belajar</a>
        <button type="button" class="btn btn-primary" id="btn-nav">Selanjutnya</button>
      </div>
    </div>
  </main>

  <script>
    (function () {
      var user = window.__pageUser;
      if (!user) return;
    function getQueryParam(nama) {
      return new URLSearchParams(window.location.search).get(nama);
    }

    var kelasId = getQueryParam('kelasId');
    var babParam = getQueryParam('bab');
    var babKe = babParam ? parseInt(babParam, 10) : NaN;

    var kelas = kelasId ? getById('kelas', kelasId) : null;
    var kuis = kelasId && !isNaN(babKe)
      ? getAll('kuis').find(function (q) {
          return String(q.kelasId) === String(kelasId) && q.babKe === babKe;
        })
      : null;

    var contentEl = document.getElementById('kuis-content');
    var btnNav = document.getElementById('btn-nav');
    var linkKembali = document.getElementById('link-kembali');

    if (kelasId) {
      linkKembali.href = 'ruang-belajar.html?id=' + encodeURIComponent(kelasId);
    } else {
      linkKembali.href = 'dashboard.html';
    }

    if (!kelasId || isNaN(babKe) || !kelas) {
      contentEl.innerHTML =
        '<div class="empty-state">' +
          '<p>Kuis tidak ditemukan.</p>' +
          '<a href="dashboard.html" class="btn btn-primary btn-sm">Ke Dashboard</a>' +
        '</div>';
      btnNav.style.display = 'none';
    } else if (!kuis || !kuis.soal || kuis.soal.length === 0) {
      document.getElementById('kuis-judul').textContent = 'Kuis Bab ' + babKe;
      document.getElementById('kuis-meta').textContent = kelas.judul;
      contentEl.innerHTML =
        '<div class="empty-state">' +
          '<p>Soal kuis untuk bab ini belum tersedia.</p>' +
          '<a href="' + linkKembali.href + '" class="btn btn-secondary btn-sm">Kembali ke Ruang Belajar</a>' +
        '</div>';
      btnNav.style.display = 'none';
    } else {
      document.getElementById('kuis-judul').textContent = 'Kuis Bab ' + babKe;
      document.getElementById('kuis-meta').textContent = kelas.judul;
      document.title = 'Kuis Bab ' + babKe + ' — ' + kelas.judul;

      var soalList = kuis.soal;
      var indeksSoal = 0;
      var jawabanUser = new Array(soalList.length).fill(null);

      function renderSoal() {
        var soal = soalList[indeksSoal];
        var html =
          '<p class="kuis-soal-nomor">Soal ' + (indeksSoal + 1) + ' dari ' + soalList.length + '</p>' +
          '<p class="kuis-pertanyaan">' + soal.pertanyaan + '</p>' +
          '<div class="kuis-pilihan">';

        soal.pilihan.forEach(function (pilihan, idx) {
          var checked = jawabanUser[indeksSoal] === idx ? ' checked' : '';
          html +=
            '<label>' +
              '<input type="radio" name="jawaban" value="' + idx + '"' + checked + '>' +
              '<span>' + pilihan + '</span>' +
            '</label>';
        });

        html += '</div>';
        contentEl.innerHTML = html;

        document.querySelectorAll('input[name="jawaban"]').forEach(function (radio) {
          radio.addEventListener('change', function () {
            jawabanUser[indeksSoal] = parseInt(this.value, 10);
          });
        });

        btnNav.textContent = indeksSoal === soalList.length - 1 ? 'Selesai' : 'Selanjutnya';
      }

      btnNav.addEventListener('click', function () {
        var selected = document.querySelector('input[name="jawaban"]:checked');
        if (!selected && jawabanUser[indeksSoal] === null) {
          alert('Pilih jawaban terlebih dahulu.');
          return;
        }
        if (selected) {
          jawabanUser[indeksSoal] = parseInt(selected.value, 10);
        }

        if (indeksSoal < soalList.length - 1) {
          indeksSoal++;
          renderSoal();
          return;
        }

        sessionStorage.setItem('hasilKuisData', JSON.stringify({
          kelasId: kelasId,
          babKe: babKe,
          judulKelas: kelas.judul,
          soal: soalList,
          jawabanUser: jawabanUser
        }));

        window.location.href = 'hasil-kuis.html';
      });

      renderSoal();
    }
  })();</script>
</body>
</html>
