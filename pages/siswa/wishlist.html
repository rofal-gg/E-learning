<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../boot-siswa.js"></script>
</head>
<body>

  <div class="layout-sidebar">
    <aside class="sidebar">
      <a href="dashboard.html" class="sidebar-brand">EduKita</a>
      <nav>
        <a href="dashboard.html" class="sidebar-link" data-page="dashboard">Dashboard</a>
        <a href="katalog.html" class="sidebar-link" data-page="katalog">Katalog Kelas</a>
        <a href="cart.html" class="sidebar-link" data-page="cart">Kelas Saya</a>
        <a href="wishlist.html" class="sidebar-link" data-page="wishlist">Wishlist</a>
        <a href="riwayat-transaksi.html" class="sidebar-link" data-page="riwayat-transaksi">Riwayat Transaksi</a>
        <a href="sertifikat.html" class="sidebar-link" data-page="sertifikat">Sertifikat</a>
        <a href="profil.html" class="sidebar-link" data-page="profil">Profil</a>
        <a href="notifikasi.html" class="sidebar-link" data-page="notifikasi">Notifikasi</a>
        <a href="#" class="sidebar-link logout" id="btn-logout">Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Wishlist</h1>
        <p class="text-gray">Kelas yang kamu simpan untuk dibeli nanti</p>
      </div>

      <div id="alert-box" class="alert-box-wrap"></div>
      <div id="wishlist-area"></div>
    </main>
  </div>

  <script>
    (function () {
      var user = window.__pageUser;
      if (!user) return;
    setActiveSidebar('wishlist');

    document.getElementById('btn-logout').addEventListener('click', function (e) {
      e.preventDefault();
      logout();
    });

    function formatRupiah(angka) {
      return angka === 0 ? 'GRATIS' : 'Rp ' + angka.toLocaleString('id-ID');
    }

    function showAlert(pesan, tipe) {
      tipe = tipe || 'success';
      var el = document.getElementById('alert-box');
      el.innerHTML = '<div class="alert alert-' + tipe + '">' + pesan + '</div>';
      setTimeout(function () { el.innerHTML = ''; }, 3000);
    }

    function getWishlistItems() {
      return getAll('wishlist')
        .filter(function (w) { return sameUserId(w.userId, user.id); })
        .map(function (w) {
          var kelas = getById('kelas', w.kelasId);
          return { wishlist: w, kelas: kelas };
        })
        .filter(function (item) { return item.kelas; });
    }

    function renderWishlist() {
      var area = document.getElementById('wishlist-area');
      var items = getWishlistItems();

      if (items.length === 0) {
        area.innerHTML =
          '<div class="empty-state">' +
            '<p>Wishlist kamu masih kosong.</p>' +
            '<a href="katalog.html" class="btn btn-primary">Jelajahi Katalog</a>' +
          '</div>';
        return;
      }

      area.innerHTML = '<div class="grid-3">' + items.map(function (item) {
        var k = item.kelas;
        var w = item.wishlist;
        return (
          '<div class="card-kelas wishlist-card">' +
            '<img src="../../' + k.gambar + '" alt="' + k.judul + '" onerror="this.src=\'../../assets/images/placeholder.jpg\'">' +
            '<div class="card-body">' +
              '<span class="badge badge-primary">' + k.kategoriNama + '</span>' +
              '<h3>' + k.judul + '</h3>' +
              '<p class="text-gray">' + k.instrukturNama + '</p>' +
              '<p class="wishlist-price"><strong>' + formatRupiah(k.harga) + '</strong></p>' +
              '<div class="wishlist-actions">' +
                '<button type="button" class="btn btn-primary btn-sm btn-beli" data-kelas-id="' + k.id + '">Beli Sekarang</button>' +
                '<button type="button" class="btn btn-danger btn-sm btn-hapus-wishlist" data-wishlist-id="' + w.id + '">Hapus dari Wishlist</button>' +
              '</div>' +
            '</div>' +
          '</div>'
        );
      }).join('') + '</div>';

      document.querySelectorAll('.btn-hapus-wishlist').forEach(function (btn) {
        btn.addEventListener('click', function () {
          if (confirm('Hapus kelas dari wishlist?')) {
            deleteItem('wishlist', this.getAttribute('data-wishlist-id'));
            renderWishlist();
          }
        });
      });

      document.querySelectorAll('.btn-beli').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var kelasId = this.getAttribute('data-kelas-id');
          var hasil = addToCart(user.id, kelasId);
          if (!hasil.sukses && hasil.pesan !== 'Kelas sudah ada di keranjang') {
            showAlert(hasil.pesan, 'danger');
            return;
          }
          window.location.href = 'cart.html';
        });
      });
    }

    renderWishlist();
  })();</script>
</body>
</html>
