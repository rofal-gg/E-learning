<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riwayat Transaksi — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../boot-siswa.js"></script>
</head>
<body>

  <div class="layout-sidebar">
    <aside class="sidebar">
      <a href="dashboard.html" class="sidebar-brand">EduKita</a>
      <nav>
        <a href="dashboard.html" class="sidebar-link" data-page="dashboard">📊 Dashboard</a>
        <a href="katalog.html" class="sidebar-link" data-page="katalog">📚 Katalog Kelas</a>
        <a href="cart.html" class="sidebar-link" data-page="cart">🛒 Kelas Saya</a>
        <a href="wishlist.html" class="sidebar-link" data-page="wishlist">❤️ Wishlist</a>
        <a href="riwayat-transaksi.html" class="sidebar-link" data-page="riwayat-transaksi">🧾 Riwayat Transaksi</a>
        <a href="sertifikat.html" class="sidebar-link" data-page="sertifikat">🏆 Sertifikat</a>
        <a href="profil.html" class="sidebar-link" data-page="profil">👤 Profil</a>
        <a href="notifikasi.html" class="sidebar-link" data-page="notifikasi">🔔 Notifikasi</a>
        <a href="#" class="sidebar-link logout" id="btn-logout">🚪 Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Riwayat Transaksi</h1>
        <p class="text-gray">Semua pembelian kelas kamu</p>
      </div>

      <div id="transaksi-area"></div>
    </main>
  </div>

  <script>
    (function () {
      var user = window.__pageUser;
      if (!user) return;
    setActiveSidebar('riwayat-transaksi');

    document.getElementById('btn-logout').addEventListener('click', function (e) {
      e.preventDefault();
      logout();
    });

    function formatRupiah(angka) {
      return angka === 0 ? 'GRATIS' : 'Rp ' + angka.toLocaleString('id-ID');
    }

    function formatTanggal(iso) {
      if (!iso) return '-';
      return new Date(iso).toLocaleString('id-ID', {
        day: 'numeric',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getNamaKelas(items) {
      return (items || []).map(function (kelasId) {
        var kelas = getById('kelas', kelasId);
        return kelas ? kelas.judul : null;
      }).filter(Boolean).join(', ') || '-';
    }

    function statusBadge(status) {
      var s = (status || 'sukses').toLowerCase();
      if (s === 'sukses' || s === 'lunas') {
        return '<span class="badge badge-success">Sukses</span>';
      }
      if (s === 'pending' || s === 'menunggu') {
        return '<span class="badge badge-warning">Menunggu</span>';
      }
      if (s === 'gagal' || s === 'ditolak') {
        return '<span class="badge badge-danger">Gagal</span>';
      }
      return '<span class="badge badge-primary">' + status + '</span>';
    }

    function renderRiwayat() {
      var area = document.getElementById('transaksi-area');
      var list = getAll('transaksi')
        .filter(function (t) { return sameUserId(t.userId, user.id); })
        .sort(function (a, b) {
          return new Date(b.tanggal || 0) - new Date(a.tanggal || 0);
        });

      if (list.length === 0) {
        area.innerHTML =
          '<div class="empty-state">' +
            '<p>Belum ada transaksi.</p>' +
            '<a href="katalog.html" class="btn btn-primary">Jelajahi Katalog</a>' +
          '</div>';
        return;
      }

      var rows = list.map(function (t) {
        return (
          '<tr>' +
            '<td><code class="transaksi-id">' + t.id + '</code></td>' +
            '<td>' + formatTanggal(t.tanggal) + '</td>' +
            '<td>' + getNamaKelas(t.items) + '</td>' +
            '<td>' + (t.metode || '-') + '</td>' +
            '<td>' + formatRupiah(t.total) + '</td>' +
            '<td>' + statusBadge(t.status) + '</td>' +
            '<td><a href="invoice.html?id=' + encodeURIComponent(t.id) + '" class="btn btn-secondary btn-sm">Invoice</a></td>' +
          '</tr>'
        );
      }).join('');

      area.innerHTML =
        '<div class="card table-wrap">' +
          '<table class="table">' +
            '<thead>' +
              '<tr>' +
                '<th>No. Transaksi</th>' +
                '<th>Tanggal</th>' +
                '<th>Kelas Dibeli</th>' +
                '<th>Metode</th>' +
                '<th>Total</th>' +
                '<th>Status</th>' +
                '<th>Aksi</th>' +
              '</tr>' +
            '</thead>' +
            '<tbody>' + rows + '</tbody>' +
          '</table>' +
        '</div>';
    }

    renderRiwayat();
  })();</script>
</body>
</html>
