<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengaturan Banner — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../../css/anggota5.css">
  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../boot-admin.js"></script>
  <script src="../../components/components.js"></script>
</head>
<body>

  <div class="layout-sidebar">
    <!-- Sidebar (dirender via komponen) -->
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
      <div class="page-header">
        <h1>Pengaturan Banner</h1>
        <p class="text-gray">Atur teks promo banner di halaman utama</p>
      </div>

      <div class="card banner-preview-box">
        <h2>Preview Banner</h2>
        <a id="banner-preview" href="#" class="hero banner-preview">
          <span id="preview-teks" class="banner-preview-text"></span>
        </a>
        <p class="text-gray banner-preview-meta">Link tujuan: <span id="preview-link-label">#</span></p>
      </div>

      <div class="card banner-form">
        <h2>Edit Banner</h2>
        <form id="form-banner">
          <div class="form-group">
            <label class="form-label" for="input-teks">Teks Banner</label>
            <input type="text" id="input-teks" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="input-link">Link Tujuan</label>
            <input type="text" id="input-link" class="form-input" placeholder="pages/siswa/katalog.html atau #">
          </div>
          <div class="form-group">
            <label class="form-label" for="input-warna">Warna Background</label>
            <input type="color" id="input-warna" class="form-input">
          </div>
          <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
        </form>
        <p id="save-msg" class="text-gray banner-save-msg"></p>
      </div>
    </main>
  </div>

  <script>
    var user = window.__pageUser;

    if (user) {
      renderSidebarAdmin('pengaturan-banner');

      

      ['input-teks', 'input-link', 'input-warna'].forEach(function (id) {
        document.getElementById(id).addEventListener('input', function () {
          tampilkanPreview({
            teks: document.getElementById('input-teks').value,
            link: document.getElementById('input-link').value || '#',
            warnaBg: document.getElementById('input-warna').value || '#4F46E5'
          });
        });
      });

      document.getElementById('form-banner').addEventListener('submit', function (e) {
        e.preventDefault();
        simpanBanner();
      });

      var bannerAwal = ambilBanner();
      document.getElementById('input-teks').value = bannerAwal.teks || '';
      document.getElementById('input-link').value = bannerAwal.link || '#';
      document.getElementById('input-warna').value = bannerAwal.warnaBg || '#4F46E5';
      tampilkanPreview(bannerAwal);
    }

    function ambilBanner() {
      try {
        return JSON.parse(localStorage.getItem('banner')) || {};
      } catch (e) {
        return {};
      }
    }

    function tampilkanPreview(banner) {
      var preview = document.getElementById('banner-preview');
      document.getElementById('preview-teks').textContent = banner.teks || 'Teks banner...';
      preview.href = banner.link || '#';
      preview.style.background = banner.warnaBg || '#4F46E5';
      document.getElementById('preview-link-label').textContent = banner.link || '#';
    }

    function simpanBanner() {
      var data = {
        teks: document.getElementById('input-teks').value.trim(),
        link: document.getElementById('input-link').value.trim() || '#',
        warnaBg: document.getElementById('input-warna').value
      };
      save('banner', data);
      document.getElementById('save-msg').textContent = 'Banner berhasil disimpan.';
      tampilkanPreview(data);
      setTimeout(function () {
        document.getElementById('save-msg').textContent = '';
      }, 3000);
    }
  </script>
</body>
</html>
