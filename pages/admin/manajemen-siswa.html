<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen Siswa — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../../css/anggota5.css">
  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../boot-admin.js"></script>
  <script src="../../components/components.js"></script>
</head>
<body>

  <div class="layout-sidebar">
    <!-- Sidebar (dirender via komponen) -->
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
      <div class="page-header">
        <h1>Manajemen Siswa</h1>
        <p class="text-gray">Kelola akun siswa terdaftar di platform</p>
      </div>

      <div class="filter-bar">
        <input type="text" id="search-input" class="form-input filter-search" placeholder="Cari nama atau email...">
      </div>

      <div id="table-area"></div>
    </main>
  </div>

  <script>
    var user = window.__pageUser;

    if (user) {
      renderSidebarAdmin('manajemen-siswa');

      

      document.getElementById('search-input').addEventListener('input', function () {
        renderTabelSiswa(ambilSiswa(this.value.trim()));
      });

      renderTabelSiswa(ambilSiswa(''));
    }

    // perkiraan tanggal daftar dari id user
    function tanggalDaftarDariId(userId) {
      if (!userId) return '-';
      var stamp = userId.slice(1, 9);
      var ms = parseInt(stamp, 36);
      if (!isNaN(ms) && ms > 946684800000) {
        return new Date(ms).toLocaleDateString('id-ID', {
          day: 'numeric',
          month: 'short',
          year: 'numeric'
        });
      }
      return userId.substring(1, 9) || userId;
    }

    function badgeStatus(status) {
      var s = status || 'aktif';
      if (s === 'blokir') {
        return '<span class="badge badge-danger">Blokir</span>';
      }
      return '<span class="badge badge-success">Aktif</span>';
    }

    // filter siswa + pencarian nama/email
    function ambilSiswa(query) {
      var q = (query || '').toLowerCase();
      return getAll('users')
        .filter(function (u) { return u.role === 'siswa'; })
        .filter(function (u) {
          if (!q) return true;
          return u.nama.toLowerCase().indexOf(q) !== -1 ||
            u.email.toLowerCase().indexOf(q) !== -1;
        });
    }

    function blokirUser(id) {
      updateItem('users', id, { status: 'blokir' });
      renderTabelSiswa(ambilSiswa(document.getElementById('search-input').value.trim()));
    }

    function aktifkanUser(id) {
      updateItem('users', id, { status: 'aktif' });
      renderTabelSiswa(ambilSiswa(document.getElementById('search-input').value.trim()));
    }

    function hapusUser(id, nama) {
      if (!confirm(`Hapus akun siswa "${nama}"? Tindakan ini tidak dapat dibatalkan.`)) {
        return;
      }
      deleteItem('users', id);
      renderTabelSiswa(ambilSiswa(document.getElementById('search-input').value.trim()));
    }

    function renderTabelSiswa(list) {
      var area = document.getElementById('table-area');

      if (list.length === 0) {
        area.innerHTML = `
          <div class="empty-state card">
            <p>Tidak ada siswa ditemukan.</p>
          </div>`;
        return;
      }

      var rows = list.map(function (u, index) {
        var status = u.status || 'aktif';
        var tombolStatus = status === 'blokir'
          ? `<button type="button" class="btn btn-primary btn-sm btn-aktifkan" data-aksi="aktifkan" data-id="${u.id}">Aktifkan</button>`
          : `<button type="button" class="btn btn-danger btn-sm btn-blokir" data-aksi="blokir" data-id="${u.id}">Blokir</button>`;
        var namaEsc = u.nama.replace(/"/g, '&quot;');

        // hitung kelas selesai
        var kelasSelesai = getAll('progres').filter(function (p) {
          return sameUserId(p.userId, u.id) && p.persen >= 100;
        });
        var totalSelesai = kelasSelesai.length;

        // nama kelas yang sudah selesai
        var namaKelasSelesai = kelasSelesai.map(function (p) {
          var k = getById('kelas', p.kelasId);
          return k ? k.judul : null;
        }).filter(Boolean).join(', ');

        var tingkatanTeks = u.tingkatan && u.tingkatan !== 'belum_tes'
          ? (u.tingkatan.charAt(0).toUpperCase() + u.tingkatan.slice(1))
          : 'Belum Tes';

        var namaOrtu = u.namaOrangTua || '-';
        var tanggalLahir = u.tanggalLahir ? new Date(u.tanggalLahir).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }) : '-';
        var noHp = u.noHp || '-';
        var namaOrtuEsc = namaOrtu.replace(/"/g, '&quot;');

        return `
          <tr>
            <td>${index + 1}</td>
            <td><strong>${u.nama}</strong></td>
            <td>${u.email}</td>
            <td>${tanggalDaftarDariId(u.id)}</td>
            <td>${tanggalLahir}</td>
            <td>${namaOrtu}</td>
            <td>${badgeStatus(status)}</td>
            <td>
              <span class="badge badge-primary">${tingkatanTeks}</span>
            </td>
            <td>${u.poin || 0}</td>
            <td>${totalSelesai}</td>
            <td class="table-aksi action-cell">
              ${tombolStatus}
              <button type="button" class="btn btn-info btn-sm btn-detail" data-id="${u.id}" data-nama="${namaEsc}" data-kelas="${namaKelasSelesai.replace(/"/g, '&quot;')}" data-tingkatan="${tingkatanTeks}" data-poin="${u.poin || 0}" data-ortu="${namaOrtuEsc}" data-tgl="${tanggalLahir}" data-nohp="${noHp}">Detail</button>
              <button type="button" class="btn btn-secondary btn-sm" data-aksi="hapus" data-id="${u.id}" data-nama="${namaEsc}">Hapus</button>
            </td>
          </tr>`;
      }).join('');

      area.innerHTML = `
        <div class="card table-wrap" style="overflow-x:auto;">
          <table class="table">
            <thead>
              <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Email</th>
                <th>Tanggal Daftar</th>
                <th>Tanggal Lahir</th>
                <th>Nama Orang Tua</th>
                <th>Status</th>
                <th>Tingkatan</th>
                <th>Poin</th>
                <th>Kelas Selesai</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>

        <!-- Modal Detail Siswa -->
        <div id="modal-detail" class="modal-overlay" style="display:none;">
          <div class="modal-content">
            <div class="modal-header">
              <h2 id="modal-siswa-nama">—</h2>
              <button type="button" class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body">
              <table class="table detail-info-table">
                <tr><td><strong>Nama Lengkap</strong></td><td id="modal-nama-lengkap">—</td></tr>
                <tr><td><strong>Email</strong></td><td id="modal-email">—</td></tr>
                <tr><td><strong>Nama Orang Tua</strong></td><td id="modal-ortu">—</td></tr>
                <tr><td><strong>Tanggal Lahir</strong></td><td id="modal-tgl-lahir">—</td></tr>
                <tr><td><strong>No. HP</strong></td><td id="modal-nohp">—</td></tr>
                <tr><td><strong>Tingkatan</strong></td><td id="modal-tingkatan">—</td></tr>
                <tr><td><strong>Poin</strong></td><td id="modal-poin">—</td></tr>
              </table>
              <h3 style="margin-top:20px;margin-bottom:12px;">Kelas yang Sudah Diselesaikan</h3>
              <div id="modal-kelas-selesai">
                <p class="text-gray">Belum ada kelas yang diselesaikan.</p>
              </div>
            </div>
          </div>
        </div>`;

      area.querySelectorAll('button[data-aksi]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var id = this.getAttribute('data-id');
          var aksi = this.getAttribute('data-aksi');

          if (aksi === 'blokir') {
            blokirUser(id);
            return;
          }
          if (aksi === 'aktifkan') {
            aktifkanUser(id);
            return;
          }
          if (aksi === 'hapus') {
            hapusUser(id, this.getAttribute('data-nama'));
          }
        });
      });

      // tombol detail — tampilkan modal
      area.querySelectorAll('.btn-detail').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var id = this.getAttribute('data-id');
          var nama = this.getAttribute('data-nama');
          var tingkatan = this.getAttribute('data-tingkatan');
          var poin = this.getAttribute('data-poin');
          var kelasStr = this.getAttribute('data-kelas');
          var ortu = this.getAttribute('data-ortu');
          var tglLahir = this.getAttribute('data-tgl');
          var noHp = this.getAttribute('data-nohp');

          document.getElementById('modal-siswa-nama').textContent = nama;
          document.getElementById('modal-nama-lengkap').textContent = nama;
          document.getElementById('modal-tingkatan').textContent = tingkatan;
          document.getElementById('modal-poin').textContent = poin;
          document.getElementById('modal-ortu').textContent = ortu;
          document.getElementById('modal-tgl-lahir').textContent = tglLahir;
          document.getElementById('modal-nohp').textContent = noHp;

          // dapatkan email dari data user
          var userData = getById('users', id);
          document.getElementById('modal-email').textContent = userData ? userData.email : '-';

          // kelas selesai
          var kelasContainer = document.getElementById('modal-kelas-selesai');
          if (kelasStr) {
            var kelasList = kelasStr.split(', ');
            kelasContainer.innerHTML = '<ul class="modal-kelas-list">' +
              kelasList.map(function (k) { return '<li>' + k + '</li>'; }).join('') +
              '</ul>';
          } else {
            kelasContainer.innerHTML = '<p class="text-gray">Belum ada kelas yang diselesaikan.</p>';
          }

          document.getElementById('modal-detail').style.display = 'flex';
        });
      });
    }

    // close modal
    document.getElementById('modal-close').addEventListener('click', function () {
      document.getElementById('modal-detail').style.display = 'none';
    });
    document.getElementById('modal-detail').addEventListener('click', function (e) {
      if (e.target === this) {
        this.style.display = 'none';
      }
    });
  </script>
</body>
</html>
