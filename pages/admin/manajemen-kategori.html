<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen Kategori — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../boot-admin.js"></script>
</head>
<body>

  <div class="layout-sidebar">
    <aside class="sidebar">
      <a href="dashboard.html" class="sidebar-brand">EduKita Admin</a>
      <nav>
        <a href="dashboard.html" class="sidebar-link" data-page="dashboard">📊 Dashboard</a>
        <a href="manajemen-siswa.html" class="sidebar-link" data-page="manajemen-siswa">👥 Manajemen Siswa</a>
        <a href="manajemen-instruktur.html" class="sidebar-link" data-page="manajemen-instruktur">🎓 Manajemen Instruktur</a>
        <a href="persetujuan-kelas.html" class="sidebar-link" data-page="persetujuan-kelas">✅ Persetujuan Kelas</a>
        <a href="verifikasi-pembayaran.html" class="sidebar-link" data-page="verifikasi-pembayaran">💳 Verifikasi Pembayaran</a>
        <a href="verifikasi-penarikan.html" class="sidebar-link" data-page="verifikasi-penarikan">🏦 Verifikasi Penarikan</a>
        <a href="manajemen-kategori.html" class="sidebar-link" data-page="manajemen-kategori">📁 Kategori</a>
        <a href="moderasi-ulasan.html" class="sidebar-link" data-page="moderasi-ulasan">⭐ Moderasi Ulasan</a>
        <a href="pengaturan-banner.html" class="sidebar-link" data-page="pengaturan-banner">🖼️ Banner</a>
        <a href="manajemen-admin.html" class="sidebar-link" data-page="manajemen-admin">🔐 Manajemen Admin</a>
        <a href="#" class="sidebar-link logout" id="btn-logout">🚪 Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Manajemen Kategori</h1>
        <p class="text-gray">Kelola kategori kelas di platform</p>
      </div>

      <div class="card" style="margin-bottom:24px;">
        <h2 style="font-size:var(--font-size-lg);margin-bottom:16px;">Tambah Kategori</h2>
        <form id="form-tambah" class="filter-bar" style="align-items:flex-end;gap:12px;">
          <div class="form-group" style="flex:1;margin-bottom:0;">
            <label class="form-label" for="nama-kategori">Nama Kategori</label>
            <input type="text" id="nama-kategori" class="form-input" placeholder="Contoh: Machine Learning" required>
          </div>
          <button type="submit" class="btn btn-primary">Tambah</button>
        </form>
      </div>

      <div id="table-area"></div>
    </main>
  </div>

  <script>
    (function () {
      var adminUser = window.__pageUser;
      if (!adminUser) return;
    document.querySelectorAll('.sidebar-link[data-page]').forEach(function (link) {
      if (window.location.href.includes(link.getAttribute('data-page'))) {
        link.classList.add('active');
      }
    });

    document.getElementById('btn-logout').addEventListener('click', function (e) {
      e.preventDefault();
      logout();
    });

    function countKelasKategori(cat) {
      return getAll('kelas').filter(function (k) {
        return k.kategoriId == cat.id || k.kategoriNama === cat.nama;
      }).length;
    }

    function mulaiEditNama(cell, cat) {
      if (cell.querySelector('input')) return;

      var input = document.createElement('input');
      input.type = 'text';
      input.className = 'form-input';
      input.value = cat.nama;
      input.style.maxWidth = '280px';

      cell.innerHTML = '';
      cell.appendChild(input);
      input.focus();
      input.select();

      function simpan() {
        var baru = input.value.trim();
        if (!baru) {
          alert('Nama kategori tidak boleh kosong.');
          renderTable();
          return;
        }
        updateItem('categories', cat.id, { nama: baru });
        var kelasList = getAll('kelas').filter(function (k) {
          return k.kategoriId == cat.id;
        });
        kelasList.forEach(function (k) {
          updateItem('kelas', k.id, { kategoriNama: baru });
        });
        renderTable();
      }

      input.addEventListener('blur', simpan);
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          input.blur();
        }
        if (e.key === 'Escape') {
          renderTable();
        }
      });
    }

    function hapusKategori(id) {
      var cat = getById('categories', id);
      if (!cat) return;

      if (countKelasKategori(cat) > 0) {
        alert('Tidak bisa hapus, masih ada kelas');
        return;
      }

      if (!confirm('Hapus kategori "' + cat.nama + '"?')) return;
      deleteItem('categories', id);
      renderTable();
    }

    function renderTable() {
      var area = document.getElementById('table-area');
      var list = getAll('categories');

      if (list.length === 0) {
        area.innerHTML =
          '<div class="empty-state card">' +
            '<p>Belum ada kategori. Tambahkan kategori pertama di atas.</p>' +
          '</div>';
        return;
      }

      var rows = list.map(function (cat, index) {
        var jumlah = countKelasKategori(cat);
        return (
          '<tr>' +
            '<td>' + (index + 1) + '</td>' +
            '<td><button type="button" class="btn-link-nama" data-id="' + cat.id + '" style="background:none;border:none;padding:0;font:inherit;color:var(--primary);cursor:pointer;text-align:left;"><strong>' + cat.nama + '</strong></button></td>' +
            '<td>' + jumlah + ' kelas</td>' +
            '<td class="table-aksi">' +
              '<button type="button" class="btn btn-danger btn-sm" data-aksi="hapus" data-id="' + cat.id + '">Hapus</button>' +
            '</td>' +
          '</tr>'
        );
      }).join('');

      area.innerHTML =
        '<div class="card table-wrap">' +
          '<table class="table">' +
            '<thead>' +
              '<tr>' +
                '<th>No</th>' +
                '<th>Nama</th>' +
                '<th>Jumlah Kelas</th>' +
                '<th>Aksi</th>' +
              '</tr>' +
            '</thead>' +
            '<tbody>' + rows + '</tbody>' +
          '</table>' +
        '</div>';

      area.querySelectorAll('.btn-link-nama').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var id = this.getAttribute('data-id');
          var cat = getById('categories', id);
          var cell = this.closest('td');
          if (cat && cell) mulaiEditNama(cell, cat);
        });
      });

      area.querySelectorAll('button[data-aksi="hapus"]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          hapusKategori(this.getAttribute('data-id'));
        });
      });
    }

    document.getElementById('form-tambah').addEventListener('submit', function (e) {
      e.preventDefault();
      var nama = document.getElementById('nama-kategori').value.trim();
      if (!nama) {
        alert('Nama kategori wajib diisi.');
        return;
      }

      var duplikat = getAll('categories').some(function (c) {
        return c.nama.toLowerCase() === nama.toLowerCase();
      });
      if (duplikat) {
        alert('Kategori dengan nama tersebut sudah ada.');
        return;
      }

      createItem('categories', { id: generateId('cat'), nama: nama });
      document.getElementById('nama-kategori').value = '';
      renderTable();
    });

    renderTable();
  })();</script>
</body>
</html>
