<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Akun — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../../css/anggota1.css">
  <script src="../../components/components.js"></script>
  <style>
    .role-group {
      display: flex;
      gap: 16px;
      margin-top: 4px;
    }
    .role-option {
      flex: 1;
      position: relative;
    }
    .role-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .role-option label {
      display: block;
      text-align: center;
      padding: 12px 16px;
      border: 2px solid var(--gray-300);
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      font-size: var(--font-size-sm);
      color: var(--gray-500);
      transition: all 0.2s;
    }
    .role-option input:checked + label {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
    }
    .role-option label:hover {
      border-color: var(--primary);
    }
    .form-subheading {
      font-size: var(--font-size-sm);
      color: var(--gray-500);
      margin: 0 0 16px;
      padding-top: 8px;
      border-top: 1px solid var(--gray-100);
    }
  </style>
</head>
<body class="auth-page">

  <div class="auth-card auth-card-wide">
    <p class="auth-logo">EduKita</p>
    <h1 class="auth-title">Daftar Akun Baru</h1>

    <div id="alert-box"></div>

    <form id="form-register">
      <div class="form-group">
        <label class="form-label" for="nama">Nama Lengkap</label>
        <input type="text" id="nama" class="form-input" placeholder="Nama lengkap kamu" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-input" placeholder="nama@email.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">Daftar Sebagai</label>
        <div class="role-group">
          <div class="role-option">
            <input type="radio" name="role" id="role-siswa" value="siswa" checked>
            <label for="role-siswa">Siswa</label>
          </div>
          <div class="role-option">
            <input type="radio" name="role" id="role-instruktur" value="instruktur">
            <label for="role-instruktur">Instruktur</label>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="password-field">
          <input type="password" id="password" class="form-input" placeholder="Minimal 6 karakter" required>
          <button type="button" class="password-toggle" data-target="password">Lihat</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="konfirmasi">Konfirmasi Password</label>
        <div class="password-field">
          <input type="password" id="konfirmasi" class="form-input" placeholder="Ulangi password" required>
          <button type="button" class="password-toggle" data-target="konfirmasi">Lihat</button>
        </div>
      </div>

      <p class="form-subheading">Informasi Pribadi (digunakan untuk reset password)</p>

      <div class="form-group">
        <label class="form-label" for="nama-ortu">Nama Orang Tua</label>
        <input type="text" id="nama-ortu" class="form-input" placeholder="Nama lengkap orang tua/wali" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="tanggal-lahir">Tanggal Lahir</label>
        <input type="date" id="tanggal-lahir" class="form-input" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="no-hp">Nomor HP</label>
        <input type="tel" id="no-hp" class="form-input" placeholder="08xx-xxxx-xxxx" required>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Daftar</button>
    </form>

    <div class="auth-links">
      <p>Sudah punya akun? <a href="login.html">Masuk di sini</a></p>
    </div>
  </div>

  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script>
    initStorage();

    function validasiForm(password, konfirmasi) {
      if (!password || password.length < 6) {
        return 'Password minimal 6 karakter.';
      }
      if (password !== konfirmasi) {
        return 'Konfirmasi password tidak sama.';
      }
      return null;
    }

    document.querySelectorAll('.password-toggle').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var input = document.getElementById(this.getAttribute('data-target'));
        var isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        this.textContent = isHidden ? 'Sembunyi' : 'Lihat';
      });
    });

    document.getElementById('form-register').addEventListener('submit', function (e) {
      e.preventDefault();

      var nama = document.getElementById('nama').value.trim();
      var email = document.getElementById('email').value.trim();
      var role = document.querySelector('input[name="role"]:checked');
      var password = document.getElementById('password').value;
      var konfirmasi = document.getElementById('konfirmasi').value;
      var namaOrtu = document.getElementById('nama-ortu').value.trim();
      var tanggalLahir = document.getElementById('tanggal-lahir').value;
      var noHp = document.getElementById('no-hp').value.trim();

      if (!nama || !email || !password || !konfirmasi || !namaOrtu || !tanggalLahir || !noHp) {
        showAlert('alert-box', 'Semua field wajib diisi.', 'danger');
        return;
      }

      role = role ? role.value : '';
      if (role !== 'siswa' && role !== 'instruktur') {
        showAlert('alert-box', 'Pilih jenis akun (Siswa atau Instruktur).', 'danger');
        return;
      }

      var errorValidasi = validasiForm(password, konfirmasi);
      if (errorValidasi) {
        showAlert('alert-box', errorValidasi, 'danger');
        return;
      }

      var hasil = register({
        nama: nama,
        email: email,
        password: password,
        role: role,
        namaOrangTua: namaOrtu,
        tanggalLahir: tanggalLahir,
        noHp: noHp || ''
      });

      if (hasil.sukses) {
        persistSession(hasil.user);
        if (role === 'siswa') {
          window.location.href = resolveAppPath('../siswa/kuis-penempatan.html');
        } else {
          redirectByRole(role);
        }
      } else {
        showAlert('alert-box', hasil.pesan, 'danger');
      }
    });
  </script>
</body>
</html>
