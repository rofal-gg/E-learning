<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../../css/anggota1.css">
  <script src="../../components/components.js"></script>
</head>
<body class="auth-page">

  <div class="auth-card">
    <p class="auth-logo">EduKita</p>
    <h1 class="auth-title">Lupa Password</h1>
    <p class="auth-subtitle">Masukkan email terdaftar. Kami akan mengirimkan link reset (simulasi).</p>

    <div id="alert-box"></div>

    <form id="form-lupa">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-input" placeholder="nama@email.com" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Kirim Link Reset</button>
    </form>

    <div class="auth-links">
      <p><a href="login.html">Kembali ke Login</a></p>
    </div>
  </div>

  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script>
    initStorage();

    // cari user berdasarkan email
    function cariUserByEmail(email) {
      return getAll('users').find(function (u) {
        return u.email && u.email.toLowerCase() === email;
      });
    }

    document.getElementById('form-lupa').addEventListener('submit', function (e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim().toLowerCase();
      var user = cariUserByEmail(email);

      if (user) {
        sessionStorage.setItem('flashMessage', 'Link reset siap. Silakan buat password baru Anda.');
        window.location.href =
          'reset-password.html?email=' + encodeURIComponent(user.email);
      } else {
        showAlert('alert-box', 'Email tidak terdaftar', 'danger');
      }
    });
  </script>
</body>
</html>
