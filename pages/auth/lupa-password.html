<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../../css/anggota1.css">
  <script src="../../components/components.js"></script>
</head>
<body class="auth-page">

  <div class="auth-card auth-card-wide">
    <p class="auth-logo">EduKita</p>
    <h1 class="auth-title">Lupa Password</h1>

    <div id="alert-box"></div>

    <div id="tahap-1">
      <p class="auth-subtitle">Masukkan email terdaftar untuk memulai reset password.</p>
      <form id="form-tahap-1">
        <div class="form-group">
          <label class="form-label" for="email-input">Email</label>
          <input type="email" id="email-input" class="form-input" placeholder="nama@email.com" required>
        </div>
        <button type="submit" id="btn-cari-akun" class="btn btn-primary btn-block">Cari Akun</button>
      </form>
    </div>

    <div id="tahap-2" style="display:none">
      <p class="auth-subtitle">Verifikasi Identitas</p>
      <p style="font-size:var(--font-size-sm);color:var(--gray-500);margin:-12px 0 20px">Masukkan informasi berikut sesuai data saat pendaftaran.</p>
      <form id="form-tahap-2">
        <div class="form-group">
          <label class="form-label" for="verif-ortu">Nama Orang Tua</label>
          <input type="text" id="verif-ortu" class="form-input" placeholder="Nama lengkap orang tua/wali" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="verif-tgl">Tanggal Lahir</label>
          <input type="date" id="verif-tgl" class="form-input" required>
        </div>
        <button type="submit" id="btn-verifikasi" class="btn btn-primary btn-block">Verifikasi</button>
      </form>
    </div>

    <div id="tahap-3" style="display:none">
      <p class="auth-subtitle">Buat Password Baru</p>
      <form id="form-tahap-3">
        <div class="form-group">
          <label class="form-label" for="new-password">Password Baru</label>
          <div class="password-field">
            <input type="password" id="new-password" class="form-input" placeholder="Minimal 6 karakter" required>
            <button type="button" class="password-toggle" data-target="new-password">Lihat</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="konfirmasi-password">Konfirmasi Password Baru</label>
          <div class="password-field">
            <input type="password" id="konfirmasi-password" class="form-input" placeholder="Ulangi password baru" required>
            <button type="button" class="password-toggle" data-target="konfirmasi-password">Lihat</button>
          </div>
        </div>
        <button type="submit" id="btn-simpan" class="btn btn-primary btn-block">Simpan Password Baru</button>
      </form>
    </div>

    <div class="auth-links">
      <p><a href="login.html">Kembali ke Login</a></p>
    </div>
  </div>

  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script>
    initStorage();

    var userDitemukan = null;

    function tampilkanTahap(id) {
      document.getElementById('tahap-1').style.display = 'none';
      document.getElementById('tahap-2').style.display = 'none';
      document.getElementById('tahap-3').style.display = 'none';
      document.getElementById(id).style.display = 'block';
    }

    document.querySelectorAll('.password-toggle').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var input = document.getElementById(this.getAttribute('data-target'));
        var isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        this.textContent = isHidden ? 'Sembunyi' : 'Lihat';
      });
    });

    document.getElementById('form-tahap-1').addEventListener('submit', function (e) {
      e.preventDefault();
      var email = document.getElementById('email-input').value.trim().toLowerCase();
      if (!email) return;

      var user = getAll('users').find(function (u) {
        return u.email && u.email.toLowerCase() === email;
      });

      if (!user) {
        showAlert('alert-box', 'Email tidak terdaftar.', 'danger');
        return;
      }

      userDitemukan = user;
      tampilkanTahap('tahap-2');
    });

    document.getElementById('form-tahap-2').addEventListener('submit', function (e) {
      e.preventDefault();

      if (!userDitemukan) {
        showAlert('alert-box', 'Sesi habis. Silakan mulai dari awal.', 'danger');
        return;
      }

      var inputOrtu = document.getElementById('verif-ortu').value.trim();
      var inputTgl = document.getElementById('verif-tgl').value;

      var ortuCocok = userDitemukan.namaOrangTua &&
        userDitemukan.namaOrangTua.trim().toLowerCase() === inputOrtu.toLowerCase();
      var tglCocok = userDitemukan.tanggalLahir === inputTgl;

      if (ortuCocok && tglCocok) {
        tampilkanTahap('tahap-3');
      } else {
        showAlert('alert-box', 'Data tidak sesuai. Periksa kembali.', 'danger');
      }
    });

    document.getElementById('form-tahap-3').addEventListener('submit', function (e) {
      e.preventDefault();

      if (!userDitemukan) {
        showAlert('alert-box', 'Sesi habis. Silakan mulai dari awal.', 'danger');
        return;
      }

      var password = document.getElementById('new-password').value;
      var konfirmasi = document.getElementById('konfirmasi-password').value;

      if (!password || password.length < 6) {
        showAlert('alert-box', 'Password minimal 6 karakter.', 'danger');
        return;
      }
      if (password !== konfirmasi) {
        showAlert('alert-box', 'Konfirmasi password tidak sama.', 'danger');
        return;
      }

      updateItem('users', userDitemukan.id, { password: password });
      showAlert('alert-box', 'Password berhasil direset. Mengarahkan ke login...', 'success');

      setTimeout(function () {
        window.location.href = 'login.html';
      }, 2000);
    });
  </script>
</body>
</html>
