<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../../css/anggota1.css">
  <script src="../../components/components.js"></script>
</head>
<body class="auth-page">

  <div class="auth-card">
    <p class="auth-logo">EduKita</p>
    <h1 class="auth-title">Masuk ke Akun Kamu</h1>

    <div id="alert-box"></div>

    <form id="form-login">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-input" placeholder="nama@email.com" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="password-field">
          <input type="password" id="password" class="form-input" placeholder="Masukkan password" required>
          <button type="button" class="password-toggle" id="toggle-password" aria-label="Tampilkan password">Lihat</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Masuk</button>
    </form>

    <div class="auth-links">
      <p>
        Belum punya akun?
        <a href="register.html">Daftar akun baru</a>
      </p>
      <p><a href="lupa-password.html">Lupa Password?</a></p>
    </div>
  </div>

  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script>
    initStorage();

    // tampilkan pesan flash setelah reset password
    var flash = sessionStorage.getItem('flashMessage');
    if (flash) {
      sessionStorage.removeItem('flashMessage');
      showAlert('alert-box', flash, 'success');
    }

    var currentUser = getCurrentUser();
    if (currentUser) {
      redirectByRole(currentUser.role);
    }

    // toggle tampil/sembunyi password
    document.getElementById('toggle-password').addEventListener('click', function () {
      var input = document.getElementById('password');
      var isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      this.textContent = isHidden ? 'Sembunyi' : 'Lihat';
    });

    // proses form login
    document.getElementById('form-login').addEventListener('submit', function (e) {
      e.preventDefault();

      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var hasil = login(email, password);

      if (hasil.sukses) {
        var next = getQueryParam('next');
        if (isAllowedNextForRole(next, hasil.user.role)) {
          window.location.replace(resolveAppPath(next));
        } else {
          redirectByRole(hasil.user.role);
        }
      } else {
        showAlert('alert-box', hasil.pesan, 'danger');
      }
    });
  </script>
</body>
</html>
