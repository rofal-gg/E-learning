<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
</head>
<body class="auth-page">

  <div class="auth-card auth-card-wide">
    <p class="auth-logo">EduKita</p>
    <h1 class="auth-title">Reset Password</h1>
    <p id="email-info" class="auth-subtitle"></p>

    <div id="alert-box"></div>

    <form id="form-reset">
      <div class="form-group">
        <label class="form-label" for="password">Password Baru</label>
        <div class="password-field">
          <input type="password" id="password" class="form-input" placeholder="Minimal 6 karakter" required>
          <button type="button" class="password-toggle" data-target="password">Lihat</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="konfirmasi">Konfirmasi Password Baru</label>
        <div class="password-field">
          <input type="password" id="konfirmasi" class="form-input" placeholder="Ulangi password baru" required>
          <button type="button" class="password-toggle" data-target="konfirmasi">Lihat</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Simpan Password Baru</button>
    </form>

    <div class="auth-links">
      <p><a href="login.html">Kembali ke Login</a></p>
    </div>
  </div>

  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script>
    initStorage();

    function showAlert(containerId, pesan, tipe) {
      tipe = tipe || 'success';
      var el = document.getElementById(containerId);
      el.innerHTML = '<div class="alert alert-' + tipe + '">' + pesan + '</div>';
    }

    function resolveEmailReset() {
      var dariUrl = getQueryParam('email');
      if (dariUrl) return decodeURIComponent(dariUrl).trim();
      var dariSesi = sessionStorage.getItem('resetPasswordEmail');
      if (dariSesi) {
        sessionStorage.removeItem('resetPasswordEmail');
        return dariSesi.trim();
      }
      return '';
    }

    var email = resolveEmailReset();
    var emailInfo = document.getElementById('email-info');
    var formReset = document.getElementById('form-reset');

    var flash = sessionStorage.getItem('flashMessage');
    if (flash) {
      sessionStorage.removeItem('flashMessage');
      showAlert('alert-box', flash, 'success');
    }

    if (!email) {
      emailInfo.textContent = 'Gunakan halaman lupa password untuk mendapatkan link reset.';
      formReset.style.display = 'none';
      showAlert(
        'alert-box',
        'Email tidak ditemukan. <a href="lupa-password.html">Kembali ke Lupa Password</a>',
        'danger'
      );
    } else {
      var userReset = getAll('users').find(function (u) {
        return u.email && u.email.toLowerCase() === email.toLowerCase();
      });

      if (!userReset) {
        emailInfo.textContent = 'Akun tidak ditemukan untuk: ' + email;
        formReset.style.display = 'none';
        email = '';
        showAlert(
          'alert-box',
          'Email tidak terdaftar. <a href="lupa-password.html">Coba email lain</a>',
          'danger'
        );
      } else {
        email = userReset.email;
        emailInfo.textContent = 'Reset password untuk: ' + email;
        if (window.history.replaceState) {
          window.history.replaceState(
            null,
            '',
            'reset-password.html?email=' + encodeURIComponent(email)
          );
        }
      }
    }

    document.querySelectorAll('.password-toggle').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var input = document.getElementById(this.getAttribute('data-target'));
        var isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        this.textContent = isHidden ? 'Sembunyi' : 'Lihat';
      });
    });

    formReset.addEventListener('submit', function (e) {
      e.preventDefault();
      if (!email) return;

      var password = document.getElementById('password').value;
      var konfirmasi = document.getElementById('konfirmasi').value;

      if (!password || password.length < 6) {
        showAlert('alert-box', 'Password minimal 6 karakter.', 'danger');
        return;
      }
      if (password !== konfirmasi) {
        showAlert('alert-box', 'Konfirmasi password tidak sama.', 'danger');
        return;
      }

      var user = getAll('users').find(function (u) {
        return u.email && u.email.toLowerCase() === email.toLowerCase();
      });

      if (!user) {
        showAlert('alert-box', 'Email tidak terdaftar.', 'danger');
        return;
      }

      updateItem('users', user.id, { password: password });
      showAlert('alert-box', 'Password berhasil direset', 'success');
      formReset.reset();

      setTimeout(function () {
        window.location.href = 'login.html';
      }, 2000);
    });
  </script>
</body>
</html>
