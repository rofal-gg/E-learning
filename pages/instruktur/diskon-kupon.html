<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diskon & Kupon — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../boot-instruktur.js"></script>
</head>
<body>

  <div class="layout-sidebar">
    <aside class="sidebar">
      <a href="dashboard.html" class="sidebar-brand">EduKita</a>
      <nav>
        <a href="dashboard.html" class="sidebar-link" data-page="dashboard">📊 Dashboard</a>
        <a href="daftar-kelas.html" class="sidebar-link" data-page="daftar-kelas">📚 Kelas Saya</a>
        <a href="buat-kelas.html" class="sidebar-link" data-page="buat-kelas">➕ Buat Kelas</a>
        <a href="tanya-jawab.html" class="sidebar-link" data-page="tanya-jawab">💬 Q&amp;A</a>
        <a href="diskon-kupon.html" class="sidebar-link" data-page="diskon-kupon">🎟️ Diskon &amp; Kupon</a>
        <a href="laporan-pendapatan.html" class="sidebar-link" data-page="laporan-pendapatan">💰 Laporan Pendapatan</a>
        <a href="tarik-saldo.html" class="sidebar-link" data-page="tarik-saldo">🏦 Tarik Saldo</a>
        <a href="profil-publik.html" class="sidebar-link" data-page="profil-publik">👤 Profil</a>
        <a href="notifikasi.html" class="sidebar-link" data-page="notifikasi">🔔 Notifikasi</a>
        <a href="#" class="sidebar-link logout" id="btn-logout">🚪 Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Diskon &amp; Kupon</h1>
        <p class="text-gray">Buat dan kelola kode kupon untuk kelas Anda</p>
      </div>

      <section class="card" style="margin-bottom: 24px;">
        <h2 style="margin: 0 0 20px; font-size: var(--font-size-lg);">Buat Kupon Baru</h2>
        <form id="form-kupon">
          <div class="grid-2" style="gap: 16px;">
            <div class="form-group">
              <label class="form-label" for="input-kode">Kode Kupon</label>
              <input type="text" id="input-kode" class="form-input" placeholder="CONTOH10" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="input-diskon">Diskon (%)</label>
              <input type="number" id="input-diskon" class="form-input" min="1" max="100" placeholder="10" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="select-kelas">Kelas</label>
              <select id="select-kelas" class="form-input" required></select>
            </div>
            <div class="form-group">
              <label class="form-label" for="input-expired">Tanggal Kadaluarsa</label>
              <input type="date" id="input-expired" class="form-input" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="margin-top: 8px;">Buat Kupon</button>
        </form>
      </section>

      <div class="card table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>Kode</th>
              <th>Diskon</th>
              <th>Kelas</th>
              <th>Kadaluarsa</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tabel-kupon-body"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    (function () {
      var user = window.__pageUser;
      if (!user) return;
    document.querySelectorAll('.sidebar-link[data-page]').forEach(function (link) {
      if (window.location.href.includes(link.getAttribute('data-page'))) {
        link.classList.add('active');
      }
    });

    document.getElementById('btn-logout').addEventListener('click', function (e) {
      e.preventDefault();
      logout();
    });

    document.getElementById('input-kode').addEventListener('input', function () {
      this.value = this.value.toUpperCase();
    });

    function getMyKelas() {
      return getAll('kelas').filter(function (k) {
        return k.instrukturId === user.id;
      });
    }

    function getKelasMap() {
      var map = {};
      getMyKelas().forEach(function (k) { map[k.id] = k; });
      return map;
    }

    function isExpired(expired) {
      if (!expired) return false;
      var d = new Date(expired);
      d.setHours(23, 59, 59, 999);
      return d < new Date();
    }

    function formatTanggal(tanggal) {
      if (!tanggal) return '-';
      return new Date(tanggal).toLocaleDateString('id-ID', {
        day: 'numeric',
        month: 'short',
        year: 'numeric'
      });
    }

    function statusBadge(expired) {
      if (isExpired(expired)) {
        return '<span class="badge badge-danger">Kadaluarsa</span>';
      }
      return '<span class="badge badge-success">Aktif</span>';
    }

    function populateKelasSelect() {
      var select = document.getElementById('select-kelas');
      var kelasList = getMyKelas();
      if (kelasList.length === 0) {
        select.innerHTML = '<option value="">Belum ada kelas</option>';
        select.disabled = true;
        return;
      }
      select.disabled = false;
      select.innerHTML = kelasList.map(function (k) {
        return '<option value="' + k.id + '">' + k.judul + '</option>';
      }).join('');
    }

    function renderTabel() {
      var tbody = document.getElementById('tabel-kupon-body');
      var kelasMap = getKelasMap();
      var list = getAll('kupon')
        .filter(function (k) { return k.instrukturId === user.id; })
        .sort(function (a, b) {
          return new Date(b.expired || 0) - new Date(a.expired || 0);
        });

      if (list.length === 0) {
        tbody.innerHTML =
          '<tr><td colspan="6" class="text-center text-gray">Belum ada kupon. Buat kupon pertama Anda!</td></tr>';
        return;
      }

      tbody.innerHTML = list.map(function (k) {
        var kelas = kelasMap[k.kelasId];
        var namaKelas = kelas ? kelas.judul : k.kelasId;
        return (
          '<tr>' +
            '<td><strong>' + k.kode + '</strong></td>' +
            '<td>' + k.diskon + '%</td>' +
            '<td>' + namaKelas + '</td>' +
            '<td>' + formatTanggal(k.expired) + '</td>' +
            '<td>' + statusBadge(k.expired) + '</td>' +
            '<td><button type="button" class="btn btn-danger btn-sm btn-hapus" data-id="' + k.id + '">Hapus</button></td>' +
          '</tr>'
        );
      }).join('');

      tbody.querySelectorAll('.btn-hapus').forEach(function (btn) {
        btn.addEventListener('click', function () {
          if (!confirm('Hapus kupon ini?')) return;
          deleteItem('kupon', btn.getAttribute('data-id'));
          renderTabel();
        });
      });
    }

    document.getElementById('form-kupon').addEventListener('submit', function (e) {
      e.preventDefault();

      var kode = document.getElementById('input-kode').value.trim().toUpperCase();
      var diskon = parseInt(document.getElementById('input-diskon').value, 10);
      var kelasId = document.getElementById('select-kelas').value;
      var expired = document.getElementById('input-expired').value;

      if (!kode || !kelasId || !expired) {
        alert('Lengkapi semua field.');
        return;
      }
      if (isNaN(diskon) || diskon < 1 || diskon > 100) {
        alert('Diskon harus antara 1–100%.');
        return;
      }

      var duplikat = getAll('kupon').some(function (k) {
        return k.kode.toUpperCase() === kode;
      });
      if (duplikat) {
        alert('Kode kupon sudah digunakan.');
        return;
      }

      createItem('kupon', {
        id: generateId('kp'),
        kode: kode,
        diskon: diskon,
        kelasId: kelasId,
        instrukturId: user.id,
        expired: expired
      });

      this.reset();
      populateKelasSelect();
      renderTabel();
    });

    populateKelasSelect();
    renderTabel();
  })();</script>
</body>
</html>
