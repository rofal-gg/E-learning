<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil Publik — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../../css/anggota4.css">
  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../boot-instruktur.js"></script>
  <script src="../../components/components.js"></script>
</head>
<body>

  <div class="layout-sidebar">
    <!-- Sidebar (dirender via komponen) -->
    <div id="sidebar-placeholder"></div>

    <main class="main-content">
      <div class="page-header">
        <h1>Profil Publik</h1>
        <p class="text-gray">Tampilan profil yang dilihat siswa di katalog instruktur</p>
      </div>

      <div id="alert-box" class="alert-box-wrap"></div>

      <div class="profil-layout">
        <section class="card profil-preview">
          <div id="profil-foto-wrap">
            <img id="profil-foto-img" class="profil-foto" src="" alt="Foto Profil" style="display:none;">
            <div id="profil-avatar-fallback" class="profil-avatar">?</div>
          </div>
          <h2 id="preview-nama">—</h2>
          <p class="text-gray" id="preview-keahlian">—</p>
          <p id="preview-bio" class="profil-preview-bio">—</p>
        </section>

        <section class="card profil-form-wrap">
          <h2>Edit Profil</h2>
          <form id="form-profil">
            <div class="form-group">
              <label class="form-label" for="input-nama">Nama</label>
              <input type="text" id="input-nama" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="input-bio">Bio</label>
              <textarea id="input-bio" class="form-input" rows="4" placeholder="Ceritakan pengalaman mengajar Anda…"></textarea>
            </div>
            <div class="form-group">
              <label class="form-label" for="input-keahlian">Keahlian</label>
              <input type="text" id="input-keahlian" class="form-input" placeholder="HTML, CSS, JavaScript">
            </div>
            <div class="form-group">
              <label class="form-label" for="input-foto">Foto Profil</label>
              <input type="file" id="input-foto" class="form-input" accept="image/*">
              <p class="form-hint">Pilih file gambar untuk foto profil (maks 2MB)</p>
              <div id="foto-preview-container" style="display:none; margin-top:8px;">
                <img id="foto-preview" class="foto-preview-img" src="" alt="Preview">
                <button type="button" class="btn btn-secondary btn-sm" id="btn-hapus-foto" style="margin-top:4px;">Hapus Foto</button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
          </form>
        </section>
      </div>
    </main>
  </div>

  <script>
    var user = window.__pageUser;

    if (user) {
      renderSidebarInstruktur('profil-publik');

      

      document.getElementById('form-profil').addEventListener('submit', function (e) {
        e.preventDefault();
        simpanProfil();
      });

      ['input-nama', 'input-bio', 'input-keahlian', 'input-foto'].forEach(function (id) {
        document.getElementById(id).addEventListener('input', function () {
          renderPreview(ambilDataForm());
        });
      });

      muatProfil();
    }

    function inisialNama(nama) {
      if (!nama) return '?';
      return nama.split(' ').map(function (n) { return n[0]; }).join('').slice(0, 2).toUpperCase();
    }

    function ambilDataForm() {
      return {
        nama: document.getElementById('input-nama').value,
        bio: document.getElementById('input-bio').value,
        keahlian: document.getElementById('input-keahlian').value,
        foto: document.getElementById('input-foto').value
      };
    }

    function renderPreview(data) {
      var fotoEl = document.getElementById('profil-foto-img');
      var fallback = document.getElementById('profil-avatar-fallback');

      document.getElementById('preview-nama').textContent = data.nama || '—';
      document.getElementById('preview-keahlian').textContent = data.keahlian || 'Belum diisi';
      document.getElementById('preview-bio').textContent = data.bio || 'Belum ada bio.';

      if (data.foto && data.foto.indexOf('data:image') === 0) {
        fotoEl.src = data.foto;
        fotoEl.style.display = 'block';
        fallback.style.display = 'none';
      } else {
        fotoEl.style.display = 'none';
        fallback.style.display = 'flex';
        fallback.textContent = inisialNama(data.nama);
      }
    }

    function muatProfil() {
      var data = getById('users', user.id) || user;
      document.getElementById('input-nama').value = data.nama || '';
      document.getElementById('input-bio').value = data.bio || '';
      document.getElementById('input-keahlian').value = data.keahlian || '';
      renderPreview(data);
      if (data.foto && data.foto.indexOf('data:image') === 0) {
        document.getElementById('foto-preview').src = data.foto;
        document.getElementById('foto-preview-container').style.display = 'block';
      }
    }

    // preview foto sebelum upload
    document.getElementById('input-foto').addEventListener('change', function () {
      var file = this.files[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) {
        showAlert('alert-box', 'Ukuran file maksimal 2MB.', 'danger');
        this.value = '';
        return;
      }
      var reader = new FileReader();
      reader.onload = function (e) {
        document.getElementById('foto-preview').src = e.target.result;
        document.getElementById('foto-preview-container').style.display = 'block';
        // update preview realtime
        var fotoEl = document.getElementById('profil-foto-img');
        var fallback = document.getElementById('profil-avatar-fallback');
        fotoEl.src = e.target.result;
        fotoEl.style.display = 'block';
        fallback.style.display = 'none';
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('btn-hapus-foto').addEventListener('click', function () {
      document.getElementById('input-foto').value = '';
      document.getElementById('foto-preview-container').style.display = 'none';
      var dataLama = getById('users', user.id) || user;
      if (dataLama.foto && dataLama.foto.indexOf('data:image') === 0) {
        // hapus foto dari storage
        updateItem('users', user.id, { foto: '' });
        var updatedUser = getById('users', user.id);
        persistSession(updatedUser);
        user = updatedUser;
        muatProfil();
      }
    });

    function simpanProfil() {
      var nama = document.getElementById('input-nama').value.trim();
      var bio = document.getElementById('input-bio').value.trim();
      var keahlian = document.getElementById('input-keahlian').value.trim();
      var fileInput = document.getElementById('input-foto');

      if (!nama) {
        showAlert('alert-box', 'Nama wajib diisi.', 'danger');
        return;
      }

      var updates = { nama: nama, bio: bio, keahlian: keahlian };

      if (fileInput.files && fileInput.files[0]) {
        var reader = new FileReader();
        reader.onload = function (e) {
          updates.foto = e.target.result;
          simpanKeStorage(updates);
        };
        reader.readAsDataURL(fileInput.files[0]);
      } else {
        var dataLama = getById('users', user.id) || user;
        var previewContainer = document.getElementById('foto-preview-container');
        if (dataLama.foto && dataLama.foto.indexOf('data:image') === 0 && previewContainer.style.display === 'none') {
          updates.foto = '';
        } else if (dataLama.foto) {
          // path biasa (non-base64) tetap dipertahankan
          updates.foto = dataLama.foto;
        }
        simpanKeStorage(updates);
      }
    }

    function simpanKeStorage(updates) {
      updateItem('users', user.id, updates);
      var updatedUser = getById('users', user.id);
      persistSession(updatedUser);
      user = updatedUser;
      showAlert('alert-box', 'Profil berhasil disimpan.', 'success');
      muatProfil();
    }
  </script>
</body>
</html>
