<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifikasi — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../../css/anggota4.css">
  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../boot-instruktur.js"></script>
</head>
<body>

  <div class="layout-sidebar">
    <aside class="sidebar">
      <a href="dashboard.html" class="sidebar-brand">EduKita</a>
      <nav>
        <a href="dashboard.html" class="sidebar-link" data-page="dashboard"><img src="../../assets/icons/Dashboard.png" width="22"> Dashboard</a>
        <a href="daftar-kelas.html" class="sidebar-link" data-page="daftar-kelas"><img src="../../assets/icons/katalog_kelas.png" width="20"> Kelas Saya</a>
        <a href="buat-kelas.html" class="sidebar-link" data-page="buat-kelas"><img src="../../assets/icons/TambahKelas.png" width="21"> Buat Kelas</a>
        <a href="tanya-jawab.html" class="sidebar-link" data-page="tanya-jawab"><img src="../../assets/icons/QnA.png" width="23"> Q&amp;A</a>
        <a href="laporan-pendapatan.html" class="sidebar-link" data-page="laporan-pendapatan"><img src="../../assets/icons/riwayat_transaksi.png" width="20"> Laporan Pendapatan</a>
        <a href="tarik-saldo.html" class="sidebar-link" data-page="tarik-saldo"><img src="../../assets/icons/TarikSaldo.png" width="20"> Tarik Saldo</a>
        <a href="profil-publik.html" class="sidebar-link" data-page="profil-publik"><img src="../../assets/icons/profil.png" width="20"> Profil</a>
        <a href="notifikasi.html" class="sidebar-link" data-page="notifikasi"><img src="../../assets/icons/notifikasi_card.png" width="20"> Notifikasi</a>
        <a href="#" class="sidebar-link logout" id="btn-logout"><img src="../../assets/icons/logout.png" width="20"> Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header page-header-flex">
        <div>
          <h1>Notifikasi</h1>
          <p class="text-gray">Pembaruan terkait kelas, penjualan, dan akun Anda</p>
        </div>
        <button type="button" id="btn-tandai-semua" class="btn btn-secondary btn-sm">Tandai Semua Dibaca</button>
      </div>

      <div id="notifikasi-area"></div>
    </main>
  </div>

  <script>
    var user = window.__pageUser;

    if (user) {
      setActiveSidebar('notifikasi');

      document.getElementById('btn-logout').addEventListener('click', function (e) {
        e.preventDefault();
        logout();
      });

      document.getElementById('btn-tandai-semua').addEventListener('click', function () {
        ambilNotifikasi().forEach(function (n) {
          if (!n.dibaca) {
            updateItem('notifikasi', n.id, { dibaca: true });
          }
        });
        renderNotifikasi(ambilNotifikasi());
      });

      renderNotifikasi(ambilNotifikasi());
    }

    function formatTanggalWaktu(iso) {
      if (!iso) return '-';
      var d = new Date(iso);
      if (isNaN(d.getTime())) return iso;
      return d.toLocaleString('id-ID', {
        day: 'numeric',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    // sync penjualan + ambil notifikasi instruktur
    function ambilNotifikasi() {
      syncNotifikasiPenjualanInstruktur(user.id);
      return getAll('notifikasi')
        .filter(function (n) { return sameUserId(n.userId, user.id); })
        .sort(function (a, b) {
          return new Date(b.tanggal || 0) - new Date(a.tanggal || 0);
        });
    }

    function renderNotifikasi(list) {
      var area = document.getElementById('notifikasi-area');

      if (list.length === 0) {
        area.innerHTML = `
          <div class="empty-state">
            <p>Belum ada notifikasi.</p>
          </div>
        `;
        return;
      }

      area.innerHTML = '<div class="notif-list">' + list.map(function (n) {
        var unread = !n.dibaca;
        return `
          <div class="notif-item card${unread ? ' notif-unread' : ''}" data-id="${n.id}" role="button" tabindex="0">
            <span class="notif-icon" aria-hidden="true">🔔</span>
            <div class="notif-body">
              <p class="notif-pesan">${n.pesan}</p>
              <p class="notif-tanggal text-gray">${formatTanggalWaktu(n.tanggal)}</p>
            </div>
            ${unread ? '<span class="badge badge-primary notif-badge-baru">Baru</span>' : ''}
          </div>
        `;
      }).join('') + '</div>';

      document.querySelectorAll('.notif-item').forEach(function (item) {
        function tandaiDibaca() {
          updateItem('notifikasi', item.getAttribute('data-id'), { dibaca: true });
          renderNotifikasi(ambilNotifikasi());
        }
        item.addEventListener('click', tandaiDibaca);
        item.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            tandaiDibaca();
          }
        });
      });
    }
  </script>
</body>
</html>
