<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buat Kuis — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../../css/anggota4.css">
  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../boot-instruktur.js"></script>
</head>
<body>

  <div class="layout-sidebar">
    <aside class="sidebar">
      <a href="dashboard.html" class="sidebar-brand">EduKita</a>
      <nav>
        <a href="dashboard.html" class="sidebar-link" data-page="dashboard"><img src="../../assets/icons/Dashboard.png" width="22"> Dashboard</a>
        <a href="daftar-kelas.html" class="sidebar-link" data-page="daftar-kelas"><img src="../../assets/icons/katalog_kelas.png" width="20"> Kelas Saya</a>
        <a href="buat-kelas.html" class="sidebar-link" data-page="buat-kelas"><img src="../../assets/icons/TambahKelas.png" width="21"> Buat Kelas</a>
        <a href="tanya-jawab.html" class="sidebar-link" data-page="tanya-jawab"><img src="../../assets/icons/QnA.png" width="23"> Q&amp;A</a>
        <a href="laporan-pendapatan.html" class="sidebar-link" data-page="laporan-pendapatan"><img src="../../assets/icons/riwayat_transaksi.png" width="20"> Laporan Pendapatan</a>
        <a href="tarik-saldo.html" class="sidebar-link" data-page="tarik-saldo"><img src="../../assets/icons/TarikSaldo.png" width="20"> Tarik Saldo</a>
        <a href="profil-publik.html" class="sidebar-link" data-page="profil-publik"><img src="../../assets/icons/profil.png" width="20"> Profil</a>
        <a href="notifikasi.html" class="sidebar-link" data-page="notifikasi"><img src="../../assets/icons/notifikasi_card.png" width="20"> Notifikasi</a>
        <a href="#" class="sidebar-link logout" id="btn-logout"><img src="../../assets/icons/logout.png" width="20"> Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header-flex">
        <div>
          <h1 id="page-judul">Buat Kuis</h1>
          <p class="text-gray" id="page-info"></p>
        </div>
        <a href="daftar-kelas.html" class="btn btn-secondary">← Kembali</a>
      </div>

      <div id="alert-box" class="alert-box-wrap"></div>

      <section class="content-section">
        <h2>Soal yang Sudah Ada</h2>
        <div id="list-soal" class="card soal-builder">
          <div class="empty-state"><p>Belum ada soal.</p></div>
        </div>
      </section>

      <section class="content-section">
        <h2>Tambah Soal Baru</h2>
        <div class="card soal-builder-form">
          <form id="form-tambah-soal">
            <div class="form-group">
              <label class="form-label" for="pertanyaan">Pertanyaan</label>
              <input type="text" id="pertanyaan" class="form-input" required placeholder="Tulis pertanyaan kuis…">
            </div>

            <div class="pilihan-input-row">
              <div class="form-group">
                <label class="form-label" for="pilihan-a">Pilihan A</label>
                <input type="text" id="pilihan-a" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="pilihan-b">Pilihan B</label>
                <input type="text" id="pilihan-b" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="pilihan-c">Pilihan C</label>
                <input type="text" id="pilihan-c" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="pilihan-d">Pilihan D</label>
                <input type="text" id="pilihan-d" class="form-input" required>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="jawaban-benar">Jawaban Benar</label>
              <select id="jawaban-benar" class="form-input kunci-jawaban-select" required>
                <option value="0">A</option>
                <option value="1">B</option>
                <option value="2">C</option>
                <option value="3">D</option>
              </select>
            </div>

            <button type="submit" class="btn btn-secondary">Tambah Soal</button>
          </form>
        </div>
      </section>

      <section class="content-section">
        <button type="button" id="btn-simpan-kuis" class="btn btn-primary">Simpan Kuis</button>
      </section>
    </main>
  </div>

  <script>
    var user = window.__pageUser;
    var kelasId = getQueryParam('kelasId') || getQueryParam('id');
    var babKe = parseInt(getQueryParam('babKe') || getQueryParam('bab') || '', 10);
    var kelas = null;
    var bab = null;
    var kuisId = null;
    var kuisExisting = null;
    var daftarSoal = [];

    if (!user) {
      /* boot-instruktur menangani redirect */
    } else if (!kelasId || !babKe) {
      alert('Kelas atau bab tidak dipilih.');
      window.location.href = 'daftar-kelas.html';
    } else {
      kelas = getById('kelas', kelasId);
      if (!kelas || !sameUserId(kelas.instrukturId, user.id)) {
        alert('Kelas tidak ditemukan atau bukan milik Anda.');
        window.location.href = 'daftar-kelas.html';
      } else {
        bab = (kelas.silabus || []).find(function (b) { return b.babKe === babKe; });
        if (!bab) {
          alert('Bab tidak ditemukan di silabus kelas ini.');
          window.location.href = 'kurikulum.html?id=' + encodeURIComponent(kelasId);
        } else {
          setActiveSidebar('daftar-kelas');
          ambilKuisAwal();

          document.getElementById('btn-logout').addEventListener('click', function (e) {
            e.preventDefault();
            logout();
          });

          document.getElementById('page-judul').textContent = 'Kuis: ' + kelas.judul;
          perbaruiInfoHalaman();

          document.getElementById('form-tambah-soal').addEventListener('submit', function (e) {
            e.preventDefault();
            tambahSoal();
          });

          document.getElementById('btn-simpan-kuis').addEventListener('click', simpanKuis);

          renderDaftarSoal();
        }
      }
    }

    // prefill daftar soal jika kuis sudah ada
    function ambilKuisAwal() {
      kuisExisting = getAll('kuis').find(function (k) {
        return k.kelasId === kelasId && k.babKe === babKe;
      });
      if (kuisExisting) {
        kuisId = kuisExisting.id;
        daftarSoal = (kuisExisting.soal || []).slice();
      }
    }

    // perbarui teks info jumlah soal
    function perbaruiInfoHalaman() {
      document.getElementById('page-info').textContent =
        'Bab ' + babKe + ' — ' + bab.judul + ' · ' + daftarSoal.length + ' soal';
    }

    // render list soal dari daftarSoal
    function renderDaftarSoal() {
      var container = document.getElementById('list-soal');
      perbaruiInfoHalaman();

      if (daftarSoal.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>Belum ada soal.</p></div>';
        return;
      }

      var labels = ['A', 'B', 'C', 'D'];
      container.innerHTML = daftarSoal.map(function (soal, index) {
        var pilihanHtml = (soal.pilihan || []).map(function (p, i) {
          var benar = soal.jawaban === i ? ' <span class="badge badge-success">Benar</span>' : '';
          return '<li>' + labels[i] + '. ' + p + benar + '</li>';
        }).join('');

        return `
          <article class="card soal-builder-item">
            <div class="soal-builder-item-header">
              <div>
                <p><strong>Soal ${index + 1}.</strong> ${soal.pertanyaan}</p>
                <ul>${pilihanHtml}</ul>
              </div>
              <button type="button" class="btn btn-danger btn-sm btn-hapus-soal" data-index="${index}">Hapus</button>
            </div>
          </article>
        `;
      }).join('');

      container.querySelectorAll('.btn-hapus-soal').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var idx = parseInt(this.getAttribute('data-index'), 10);
          if (!confirm('Hapus soal ini?')) return;
          hapusSoal(idx);
        });
      });
    }

    // ambil dari form, push ke daftarSoal, re-render
    function tambahSoal() {
      var pertanyaan = document.getElementById('pertanyaan').value.trim();
      var pilihan = [
        document.getElementById('pilihan-a').value.trim(),
        document.getElementById('pilihan-b').value.trim(),
        document.getElementById('pilihan-c').value.trim(),
        document.getElementById('pilihan-d').value.trim()
      ];
      var jawaban = parseInt(document.getElementById('jawaban-benar').value, 10);

      if (!pertanyaan || pilihan.some(function (p) { return !p; })) {
        showAlert('alert-box', 'Mohon lengkapi pertanyaan dan semua pilihan jawaban.', 'danger');
        return;
      }

      daftarSoal.push({ pertanyaan: pertanyaan, pilihan: pilihan, jawaban: jawaban });
      document.getElementById('form-tambah-soal').reset();
      renderDaftarSoal();
    }

    // hapus soal dari daftarSoal
    function hapusSoal(index) {
      daftarSoal.splice(index, 1);
      renderDaftarSoal();
    }

    // simpan kuis ke localStorage
    function simpanKuis() {
      if (daftarSoal.length === 0) {
        showAlert('alert-box', 'Tambahkan minimal satu soal sebelum menyimpan kuis.', 'danger');
        return;
      }

      if (kuisExisting) {
        updateItem('kuis', kuisId, { soal: daftarSoal });
      } else {
        kuisId = generateId('q');
        createItem('kuis', {
          id: kuisId,
          kelasId: kelasId,
          babKe: babKe,
          soal: daftarSoal
        });
        kuisExisting = getById('kuis', kuisId);
      }

      showAlert('alert-box', 'Kuis berhasil disimpan.', 'success');
      renderDaftarSoal();
    }
  </script>
</body>
</html>
