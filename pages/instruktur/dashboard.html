<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Instruktur — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../../css/anggota1.css">
  <link rel="stylesheet" href="../../css/anggota2.css">
  <link rel="stylesheet" href="../../css/anggota3.css">
  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../boot-instruktur.js"></script>
</head>
<body>

  <div class="layout-sidebar">
    <aside class="sidebar">
      <a href="dashboard.html" class="sidebar-brand">EduKita</a>
      <nav>
        <a href="dashboard.html" class="sidebar-link" data-page="dashboard"><img src="../../assets/icons/Dashboard.png" width="22"> Dashboard</a>
        <a href="daftar-kelas.html" class="sidebar-link" data-page="daftar-kelas"><img src="../../assets/icons/katalog_kelas.png" width="20"> Kelas Saya</a>
        <a href="buat-kelas.html" class="sidebar-link" data-page="buat-kelas"><img src="../../assets/icons/TambahKelas.png" width="21"> Buat Kelas</a>
        <a href="tanya-jawab.html" class="sidebar-link" data-page="tanya-jawab"><img src="../../assets/icons/QnA.png" width="23"> Q&amp;A</a>
        <a href="laporan-pendapatan.html" class="sidebar-link" data-page="laporan-pendapatan"><img src="../../assets/icons/riwayat_transaksi.png" width="20"> Laporan Pendapatan</a>
        <a href="tarik-saldo.html" class="sidebar-link" data-page="tarik-saldo"><img src="../../assets/icons/TarikSaldo.png" width="20"> Tarik Saldo</a>
        <a href="profil-publik.html" class="sidebar-link" data-page="profil-publik"><img src="../../assets/icons/profil.png" width="20"> Profil</a>
        <a href="notifikasi.html" class="sidebar-link" data-page="notifikasi"><img src="../../assets/icons/notifikasi_card.png" width="20"> Notifikasi</a>
        <a href="#" class="sidebar-link logout" id="btn-logout"><img src="../../assets/icons/logout.png" width="20"> Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1 id="greeting">Halo, Instruktur! 👋</h1>
      </div>

      <div class="grid-4" id="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-value" id="kpi-total-kelas">0</div>
          <div class="kpi-label">Total Kelas</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="kpi-total-siswa">0</div>
          <div class="kpi-label">Total Siswa</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="kpi-saldo">Rp 0</div>
          <div class="kpi-label">Saldo</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value" id="kpi-rating">0</div>
          <div class="kpi-label">Rating Rata-rata</div>
        </div>
      </div>

      <section class="content-section">
        <h2>Kelas Terbaru</h2>
        <div class="card table-wrap">
          <table class="table" id="tabel-kelas-terbaru">
            <thead>
              <tr>
                <th>Judul</th>
                <th>Status</th>
                <th>Total Siswa</th>
                <th>Rating</th>
              </tr>
            </thead>
            <tbody id="kelas-terbaru-body"></tbody>
          </table>
        </div>
      </section>

      <section class="content-section">
        <div class="page-header-flex" style="margin-bottom: 20px;">
          <h2 style="margin: 0;">Q&amp;A Terbaru</h2>
          <a href="tanya-jawab.html" class="btn btn-secondary btn-sm">Lihat Semua</a>
        </div>
        <div id="qa-terbaru"></div>
      </section>
    </main>
  </div>

  <script>
    var user = window.__pageUser;

    if (user) {
      document.getElementById('greeting').textContent = 'Halo, ' + user.nama + '! 👋';
      setActiveSidebar('dashboard');

      document.getElementById('btn-logout').addEventListener('click', function (e) {
        e.preventDefault();
        logout();
      });

      var kelasList = ambilKelasInstruktur();
      renderKPI(kelasList);
      renderKelasTerbaru(kelasList);
      renderQATerbaru(kelasList);
    }

    // format saldo instruktur (bukan harga kelas)
    function formatSaldo(angka) {
      var n = angka || 0;
      return 'Rp ' + Number(n).toLocaleString('id-ID');
    }

    // ambil semua kelas milik instruktur
    function ambilKelasInstruktur() {
      return getAll('kelas').filter(function (k) {
        return k.instrukturId === user.id;
      });
    }

    // badge status kelas
    function kelasStatusBadge(status) {
      if (status === 'published') {
        return '<span class="badge badge-success">Published</span>';
      }
      if (status === 'rejected') {
        return '<span class="badge badge-danger">Rejected</span>';
      }
      return '<span class="badge badge-warning">Pending</span>';
    }

    // hitung siswa unik per kelas
    function countSiswaPerKelas(kelasId) {
      var siswaIds = [];
      getAll('transaksi').forEach(function (t) {
        if ((t.status || 'sukses') !== 'sukses') return;
        (t.items || []).forEach(function (itemId) {
          if (itemId === kelasId && siswaIds.indexOf(t.userId) === -1) {
            siswaIds.push(t.userId);
          }
        });
      });
      return siswaIds.length;
    }

    // hitung total siswa unik di semua kelas instruktur
    function countTotalSiswaInstruktur(kelasIds) {
      var siswaIds = [];
      getAll('transaksi').forEach(function (t) {
        if ((t.status || 'sukses') !== 'sukses') return;
        var punyaKelasInstruktur = (t.items || []).some(function (itemId) {
          return kelasIds.indexOf(itemId) !== -1;
        });
        if (punyaKelasInstruktur && siswaIds.indexOf(t.userId) === -1) {
          siswaIds.push(t.userId);
        }
      });
      return siswaIds.length;
    }

    // render kartu KPI dashboard
    function renderKPI(kelasList) {
      var kelasIds = kelasList.map(function (k) { return k.id; });
      var freshUser = getById('users', user.id) || user;
      var avgRating = 0;

      if (kelasList.length > 0) {
        var totalRating = kelasList.reduce(function (sum, k) {
          return sum + (k.rating || 0);
        }, 0);
        avgRating = (totalRating / kelasList.length).toFixed(1);
      }

      document.getElementById('kpi-total-kelas').textContent = kelasList.length;
      document.getElementById('kpi-total-siswa').textContent = countTotalSiswaInstruktur(kelasIds);
      document.getElementById('kpi-saldo').textContent = formatSaldo(freshUser.saldo);
      document.getElementById('kpi-rating').textContent = kelasList.length ? avgRating + ' ★' : '-';
    }

    // render tabel 5 kelas terbaru
    function renderKelasTerbaru(kelasList) {
      var tbody = document.getElementById('kelas-terbaru-body');
      var terbaru = kelasList.slice().reverse().slice(0, 5);

      if (terbaru.length === 0) {
        tbody.innerHTML =
          '<tr><td colspan="4" class="text-center text-gray">Belum ada kelas. Buat kelas pertama Anda!</td></tr>';
        return;
      }

      tbody.innerHTML = terbaru.map(function (k) {
        return `
          <tr>
            <td><strong>${k.judul}</strong></td>
            <td>${kelasStatusBadge(k.status)}</td>
            <td>${countSiswaPerKelas(k.id)}</td>
            <td><span class="stars">${k.rating || 0} ★</span></td>
          </tr>
        `;
      }).join('');
    }

    // render 3 Q&A terbaru dari siswa
    function renderQATerbaru(kelasList) {
      var container = document.getElementById('qa-terbaru');
      var kelasIds = kelasList.map(function (k) { return k.id; });
      var kelasMap = {};
      kelasList.forEach(function (k) { kelasMap[k.id] = k; });

      var diskusiList = getAll('diskusi')
        .filter(function (d) { return kelasIds.indexOf(d.kelasId) !== -1; })
        .sort(function (a, b) {
          return new Date(b.tanggal) - new Date(a.tanggal);
        })
        .slice(0, 3);

      if (diskusiList.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>Belum ada pertanyaan dari siswa.</p>
            <a href="tanya-jawab.html" class="btn btn-secondary btn-sm">Buka Q&amp;A</a>
          </div>
        `;
        return;
      }

      container.innerHTML = diskusiList.map(function (d) {
        var kelas = kelasMap[d.kelasId];
        var judulKelas = kelas ? kelas.judul : 'Kelas';
        return `
          <article class="card diskusi-item" style="margin-bottom: 12px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px;">
              <span class="badge badge-primary">${judulKelas}</span>
              <span class="diskusi-tanggal">${formatTanggal(d.tanggal)}</span>
            </div>
            <p><strong>${d.userName}</strong></p>
            <p class="diskusi-pertanyaan">${d.pertanyaan}</p>
            <a href="tanya-jawab.html" class="text-link-sm">Balas pertanyaan →</a>
          </article>
        `;
      }).join('');
    }
  </script>
</body>
</html>
