<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tanya Jawab — Platform E-Learning</title>
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="../../css/anggota4.css">
  <script src="../../data.js"></script>
  <script src="../../storage.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../boot-instruktur.js"></script>
</head>
<body>

  <div class="layout-sidebar">
    <aside class="sidebar">
      <a href="dashboard.html" class="sidebar-brand">EduKita</a>
      <nav>
        <a href="dashboard.html" class="sidebar-link" data-page="dashboard"><img src="../../assets/icons/Dashboard.png" width="22"> Dashboard</a>
        <a href="daftar-kelas.html" class="sidebar-link" data-page="daftar-kelas"><img src="../../assets/icons/katalog_kelas.png" width="20"> Kelas Saya</a>
        <a href="buat-kelas.html" class="sidebar-link" data-page="buat-kelas"><img src="../../assets/icons/TambahKelas.png" width="21"> Buat Kelas</a>
        <a href="tanya-jawab.html" class="sidebar-link" data-page="tanya-jawab"><img src="../../assets/icons/QnA.png" width="23"> Q&amp;A</a>
        <a href="laporan-pendapatan.html" class="sidebar-link" data-page="laporan-pendapatan"><img src="../../assets/icons/riwayat_transaksi.png" width="20"> Laporan Pendapatan</a>
        <a href="tarik-saldo.html" class="sidebar-link" data-page="tarik-saldo"><img src="../../assets/icons/TarikSaldo.png" width="20"> Tarik Saldo</a>
        <a href="profil-publik.html" class="sidebar-link" data-page="profil-publik"><img src="../../assets/icons/profil.png" width="20"> Profil</a>
        <a href="notifikasi.html" class="sidebar-link" data-page="notifikasi"><img src="../../assets/icons/notifikasi_card.png" width="20"> Notifikasi</a>
        <a href="#" class="sidebar-link logout" id="btn-logout"><img src="../../assets/icons/logout.png" width="20"> Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Tanya Jawab Siswa</h1>
        <p class="text-gray">Balas pertanyaan dari semua kelas Anda</p>
      </div>

      <div id="tanya-jawab-list" class="tanya-jawab-list"></div>
    </main>
  </div>

  <script>
    var user = window.__pageUser;

    if (user) {
      setActiveSidebar('tanya-jawab');

      document.getElementById('btn-logout').addEventListener('click', function (e) {
        e.preventDefault();
        logout();
      });

      renderDaftarTanya();
    }

    // inisial nama untuk avatar
    function inisialNama(nama) {
      if (!nama) return '?';
      return nama.split(' ').map(function (n) { return n[0]; }).join('').slice(0, 2).toUpperCase();
    }

    // id kelas milik instruktur
    function ambilIdKelasSaya() {
      return getAll('kelas')
        .filter(function (k) { return sameUserId(k.instrukturId, user.id); })
        .map(function (k) { return k.id; });
    }

    // map kelas untuk label judul
    function ambilMapKelas() {
      var map = {};
      getAll('kelas').forEach(function (k) {
        if (sameUserId(k.instrukturId, user.id)) map[k.id] = k;
      });
      return map;
    }

    // HTML satu balasan
    function buatHtmlBalasan(b) {
      return `
        <div class="tanya-balasan">
          <div class="tanya-avatar">${inisialNama(b.userName)}</div>
          <div class="tanya-balasan-body">
            <strong>${b.userName}</strong>
            <span class="tanya-tanggal">${formatTanggal(b.tanggal)}</span>
            <p>${b.teks}</p>
          </div>
        </div>
      `;
    }

    // simpan balasan instruktur
    function kirimBalasan(diskusiId, teks) {
      var diskusi = getById('diskusi', diskusiId);
      if (!diskusi) return;

      var balasan = (diskusi.balasan || []).slice();
      balasan.push({
        userId: user.id,
        userName: user.nama,
        teks: teks,
        tanggal: new Date().toISOString()
      });

      updateItem('diskusi', diskusiId, { balasan: balasan });
      renderDaftarTanya();
    }

    // render daftar pertanyaan siswa
    function renderDaftarTanya() {
      var container = document.getElementById('tanya-jawab-list');
      var kelasIds = ambilIdKelasSaya();
      var kelasMap = ambilMapKelas();

      var list = getAll('diskusi')
        .filter(function (d) { return kelasIds.indexOf(d.kelasId) !== -1; })
        .sort(function (a, b) {
          return new Date(b.tanggal) - new Date(a.tanggal);
        });

      if (list.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>Belum ada pertanyaan dari siswa.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = list.map(function (d) {
        var kelas = kelasMap[d.kelasId];
        var namaKelas = kelas ? kelas.judul : 'Kelas';
        var balasanHtml = (d.balasan || []).map(buatHtmlBalasan).join('');
        var balasanSection = balasanHtml
          ? `<div class="balasan-list"><h3>Balasan</h3>${balasanHtml}</div>`
          : '';

        return `
          <article class="card tanya-item" data-id="${d.id}">
            <div class="tanya-item-header">
              <span class="badge badge-primary">${namaKelas}</span>
              <span class="tanya-tanggal">${formatTanggal(d.tanggal)}</span>
            </div>
            <p><strong>${d.userName}</strong></p>
            <p class="tanya-pertanyaan">${d.pertanyaan}</p>
            ${balasanSection}
            <form class="form-balas" data-id="${d.id}">
              <div class="form-group">
                <label class="form-label">Balasan Anda</label>
                <textarea class="form-input input-balasan" rows="3" placeholder="Tulis balasan untuk siswa…" required></textarea>
              </div>
              <button type="submit" class="btn btn-primary btn-sm">Balas</button>
            </form>
          </article>
        `;
      }).join('');

      container.querySelectorAll('.form-balas').forEach(function (form) {
        form.addEventListener('submit', function (e) {
          e.preventDefault();
          var teks = this.querySelector('.input-balasan').value.trim();
          if (!teks) return;
          kirimBalasan(this.getAttribute('data-id'), teks);
        });
      });
    }
  </script>
</body>
</html>
